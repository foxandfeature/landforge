name: Build and Deploy Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *" # Runs automatically on the 1st of every month
  workflow_dispatch:
    inputs:
      region:
        description: "Region path from regions.json (e.g. europe/germany/niedersachsen), or ALL_REGIONS. GitHub Actions choice inputs can't be populated dynamically from a file, so this is free text - check regions.json for valid values."
        required: true
        default: "ALL_REGIONS"
        type: string
      debug_run_id:
        description: "DEBUG: Run ID to download existing artifacts (skips tile generation)"
        required: false
        type: string

permissions:
  contents: write

# Serializes runs so two concurrent workflows never race to commit
# region_timings.json or fight over the tippecanoe/land-data caches.
concurrency:
  group: build-deploy-land-tiles
  cancel-in-progress: false

env:
  # Base zoom used to grid-split the tiling stage. z3 = 8x8 = 64 quadrants,
  # comfortably under GitHub's 256-combination matrix cap once packed into
  # NUM_TILE_RUNNERS batches. Must be >= 1 (the overview job builds z0
  # through SPLIT_ZOOM-1 globally, see build-lowzoom-overview).
  SPLIT_ZOOM: "3"
  NUM_TILE_RUNNERS: "20"
  # Extra margin (degrees) clipped into each quadrant's INPUT beyond its
  # exact bounds, so tippecanoe's own tile-edge buffering has cross-border
  # context to work with. --clip-bounding-box then hard-trims the OUTPUT
  # back to the exact quadrant, so neighbouring quadrants still never
  # produce overlapping tiles - see build-tile-grid for why that matters.
  TILE_CLIP_BUFFER_DEG: "0.2"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.regions.outputs.batches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Region Timings from Dedicated Data Branch
        # region_timings.json lives on its own orphan branch (see
        # update-timings job) rather than main, so the auto-generated
        # timing commits never clutter the source-code commit history.
        env:
          TIMINGS_BRANCH: region-timings
        run: |
          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$TIMINGS_BRANCH"
            git show "origin/$TIMINGS_BRANCH:region_timings.json" > region_timings.json
          else
            echo '{}' > region_timings.json
            echo "The $TIMINGS_BRANCH branch doesn't exist yet - starting with empty timings."
          fi

      - name: Balance Regions Across 20 Runners by Estimated Time
        id: regions
        env:
          NUM_RUNNERS: "20"
          # Only used before region_timings.json has any data at all
          # (i.e. the very first run ever). After that, unseen regions
          # fall back to the average of whatever we've measured so far.
          DEFAULT_ESTIMATE_SECONDS: "180"
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_REGION: ${{ github.event.inputs.region }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          NUM_RUNNERS = int(os.environ["NUM_RUNNERS"])
          DEFAULT_ESTIMATE = float(os.environ["DEFAULT_ESTIMATE_SECONDS"])
          event_name = os.environ["EVENT_NAME"]
          manual_region = os.environ.get("MANUAL_REGION", "").strip()

          with open("regions.json") as f:
              all_regions_pool = json.load(f)

          with open("region_timings.json") as f:
              timings = json.load(f)

          if event_name == "schedule" or manual_region == "ALL_REGIONS":
              all_regions = all_regions_pool
          else:
              # Free-text input (see workflow_dispatch.inputs.region) - validate
              # against regions.json so a typo fails fast with a clear message
              # instead of a cryptic 404 several minutes into build-tiles.
              if manual_region not in all_regions_pool:
                  sys.exit(
                      f"'{manual_region}' was not found in regions.json. "
                      "Check the exact path (e.g. europe/germany/niedersachsen) "
                      "and try again, or use ALL_REGIONS."
                  )
              all_regions = [manual_region]

          fallback = (sum(timings.values()) / len(timings)) if timings else DEFAULT_ESTIMATE
          estimates = [(r, timings.get(r, fallback)) for r in all_regions]

          # Longest-Processing-Time-first greedy bin packing: sort the
          # heaviest (slowest, by last known duration) regions first, and
          # always drop the next one onto whichever runner currently has
          # the smallest total. This keeps all 20 runners' *estimated
          # wall-clock time* close to equal, instead of just splitting the
          # region *count* evenly like the old `_nwise(20)` chunking did.
          estimates.sort(key=lambda x: x[1], reverse=True)

          num_bins = min(NUM_RUNNERS, len(estimates)) or 1
          bins = [[] for _ in range(num_bins)]
          totals = [0.0] * num_bins

          for region, est in estimates:
              idx = totals.index(min(totals))
              bins[idx].append(region)
              totals[idx] += est

          print(f"Packed {len(estimates)} region(s) into {num_bins} runner(s):")
          for i, (b, t) in enumerate(zip(bins, totals)):
              print(f"  runner {i}: {len(b)} region(s), ~{t:.0f}s estimated -> {b}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batches={json.dumps(bins)}\n")
          PYEOF

  prepare-tile-grid:
    # Independent of the region pipeline entirely - just enumerates the
    # fixed z=SPLIT_ZOOM grid of quadrants and balances them across
    # NUM_TILE_RUNNERS using past durations, the same LPT approach as
    # `prepare` uses for named regions. Runs even on debug runs, since
    # tiling itself is never skipped (only build-tiles is).
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.grid.outputs.batches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Tile Timings from Dedicated Data Branch
        env:
          TIMINGS_BRANCH: region-timings
        run: |
          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$TIMINGS_BRANCH"
            git show "origin/$TIMINGS_BRANCH:tile_timings.json" > tile_timings.json 2>/dev/null || echo '{}' > tile_timings.json
          else
            echo '{}' > tile_timings.json
            echo "The $TIMINGS_BRANCH branch doesn't exist yet - starting with empty timings."
          fi

      - name: Balance Grid Quadrants Across Tile Runners by Estimated Time
        id: grid
        env:
          DEFAULT_ESTIMATE_SECONDS: "60"
        run: |
          python3 << 'PYEOF'
          import json, os

          SPLIT_ZOOM = int(os.environ["SPLIT_ZOOM"])
          NUM_RUNNERS = int(os.environ["NUM_TILE_RUNNERS"])
          DEFAULT_ESTIMATE = float(os.environ["DEFAULT_ESTIMATE_SECONDS"])

          with open("tile_timings.json") as f:
              timings = json.load(f)

          n = 2 ** SPLIT_ZOOM
          all_tiles = [f"{SPLIT_ZOOM}/{x}/{y}" for x in range(n) for y in range(n)]

          fallback = (sum(timings.values()) / len(timings)) if timings else DEFAULT_ESTIMATE
          estimates = [(t, timings.get(t, fallback)) for t in all_tiles]

          # Same LPT bin-packing as the region `prepare` job. Ocean-only
          # quadrants naturally converge to ~0s after their first run and
          # end up bunched together on shared runners, while land-dense
          # quadrants (e.g. over a continent) end up isolated on their own.
          estimates.sort(key=lambda x: x[1], reverse=True)

          num_bins = min(NUM_RUNNERS, len(estimates)) or 1
          bins = [[] for _ in range(num_bins)]
          totals = [0.0] * num_bins

          for tile, est in estimates:
              idx = totals.index(min(totals))
              bins[idx].append(tile)
              totals[idx] += est

          print(f"Packed {len(estimates)} quadrant(s) into {num_bins} runner(s):")
          for i, (b, t) in enumerate(zip(bins, totals)):
              print(f"  runner {i}: {len(b)} quadrant(s), ~{t:.0f}s estimated -> {b}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batches={json.dumps(bins)}\n")
          PYEOF

  setup-tools:
    runs-on: ubuntu-latest
    outputs:
      tippecanoe-key: ${{ steps.tc-version.outputs.key }}
    steps:
      - name: Determine Tippecanoe Cache Key
        id: tc-version
        run: |
          # Generate a deterministic cache key using Tippecanoe's latest commit hash
          HASH=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)
          echo "key=tippecanoe-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache Tippecanoe Binaries
        id: cache-tippecanoe
        uses: actions/cache@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ steps.tc-version.outputs.key }}

      - name: Build Tippecanoe (Only on Cache Miss)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc)
          mkdir -p ../tippecanoe-bin
          cp tippecanoe tile-join ../tippecanoe-bin/

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Global Land Data
        id: cache-land
        uses: actions/cache@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}

      - name: Download Global Land Data (Only on Cache Miss)
        if: steps.cache-land.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss! Downloading OSM land polygons from web..."
          attempt=1
          max_attempts=5
          wait_seconds=15
          until wget -nv "https://osmdata.openstreetmap.de/download/land-polygons-split-4326.zip" -O land.zip; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "❌ Failed to download land data after $attempt attempts."
              exit 1
            fi
            echo "⚠️  Attempt $attempt/$max_attempts failed. Retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          unzip -q -o land.zip -d land_data
          rm land.zip

  build-tiles:
    # Skip this heavy job entirely if a debug run ID is provided
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.prepare.outputs.batches) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GDAL & Mapshaper
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin nodejs npm
          sudo npm install -g mapshaper

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore Global Land Data from Cache
        uses: actions/cache/restore@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}
          fail-on-cache-miss: true

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          # Read and parse Geofabrik .poly format lines into coordinates
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          # Close the polygon loop if required
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          # Format structures cleanly into a single valid WKT geometry string
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Process Region Data (Loop through Batch)
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          REGIONS=$(echo '${{ toJSON(matrix.batch) }}' | jq -r '.[]')

          echo "### Region Processing Metrics (Batch ${{ strategy.job-index }})" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (Seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="timings-batch-${{ strategy.job-index }}.json"
          echo '{}' > "$TIMINGS_FILE"

          fetch_with_retry() {
            local url="$1"
            local output="$2"
            local max_attempts=10
            local wait_seconds=15
            local attempt=1

            until wget -nv "$url" -O "$output"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "❌ Giving up on $url after $attempt attempts."
                return 1
              fi
              echo "⚠️  Attempt $attempt/$max_attempts for $url failed. Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
              attempt=$((attempt + 1))
              wait_seconds=$((wait_seconds * 2))
            done
          }

          for REGION in $REGIONS; do
              echo "========================================"
              echo "Processing Region: $REGION"
              echo "========================================"
              
              START_TIME=$SECONDS
              
              fetch_with_retry "https://download.geofabrik.de/${REGION}.poly" region.poly || exit 1
              fetch_with_retry "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" region.shp.zip || exit 1
              
              unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*"
              python3 poly2wkt.py

              echo "1. Clipping global land polygons to the boundary..."
              # ogr2ogr filters global land polygons on disk to keep RAM usage low
              ogr2ogr -f "ESRI Shapefile" local_land.shp \
                land_data/land-polygons-split-4326/land_polygons.shp \
                -clipsrc "$(cat boundary.wkt)" \
                -makevalid

              echo "2. Punching inland water out of the clipped land (via Mapshaper)..."
              mapshaper local_land.shp -erase gis_osm_water_a_free_1.shp -o land_layer.ndjson

              # Instead of tiling this region on its own, keep the raw erased
              # geometry and compress it. Tiling happens once for the whole
              # world in deploy-tiles - this avoids both the final tile-join
              # fan-in bottleneck AND inconsistent --drop-densest-as-needed
              # decisions across neighbouring regions.
              FILENAME=$(echo "${REGION}" | tr '/' '-').ndjson.gz
              echo "3. Compressing erased land geometry for later global tiling..."
              gzip -c land_layer.ndjson > "$FILENAME"
              
              ELAPSED_TIME=$(( SECONDS - START_TIME ))
              echo "✅ Completed $REGION in $ELAPSED_TIME seconds."
              
              echo "| \`$REGION\` | $ELAPSED_TIME |" >> $GITHUB_STEP_SUMMARY

              # Record this region's duration so next month's `prepare` job
              # can balance runners by actual measured time, not just count.
              jq --arg region "$REGION" --argjson t "$ELAPSED_TIME" \
                '. + {($region): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
                && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"
              
              # Clear temporary space to prevent running out of disk storage across batch loops
              rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* boundary.wkt land_layer.ndjson local_land.*
          done

      - name: Upload Batch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: land-ndjson-batch-${{ strategy.job-index }}
          path: "*.ndjson.gz"
          retention-days: 1

      - name: Upload Batch Timings
        uses: actions/upload-artifact@v4
        with:
          name: region-timings-batch-${{ strategy.job-index }}
          path: "timings-batch-*.json"
          retention-days: 1

  update-timings:
    # Runs whenever either build-tiles or build-tile-grid actually executed
    # and wasn't cancelled outright. Deliberately NOT gated on either fully
    # succeeding: with fail-fast disabled, some batches can fail while
    # others finish fine, and the timings from the successful ones are
    # still worth keeping for next month's balancing. A debug run skips
    # build-tiles, so there's simply nothing new for region_timings.json
    # that time - the merge step below already handles that gracefully.
    if: ${{ !cancelled() }}
    needs: [build-tiles, build-tile-grid]
    runs-on: ubuntu-latest
    env:
      TIMINGS_BRANCH: region-timings
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Per-Batch Region Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every batch failed, or a debug run skipped build-tiles
        with:
          pattern: region-timings-batch-*
          path: download_region_timings
          merge-multiple: true

      - name: Download Per-Batch Tile Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts to fetch if every quadrant batch failed
        with:
          pattern: tile-timings-batch-*
          path: download_tile_timings
          merge-multiple: true

      - name: Switch to Dedicated Timings Branch
        # Keeps the timings files' auto-commits off main entirely. If
        # the branch already exists we check it out as-is; otherwise we
        # create it as an orphan (no shared history with main) so it only
        # ever contains these two small files, never a copy of the repo.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            echo "Branch $TIMINGS_BRANCH exists - checking it out."
            git fetch origin "$TIMINGS_BRANCH"
            git checkout -B "$TIMINGS_BRANCH" "origin/$TIMINGS_BRANCH"
          else
            echo "Branch $TIMINGS_BRANCH doesn't exist yet - creating an orphan branch."
            git checkout --orphan "$TIMINGS_BRANCH"
            git rm -rf . > /dev/null
          fi

      - name: Merge Region Timings
        run: |
          if [ ! -f region_timings.json ]; then echo '{}' > region_timings.json; fi

          shopt -s nullglob
          files=(download_region_timings/timings-batch-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No region timing artifacts found - nothing to merge this run."
          else
            # Later files win on key collision, so freshly-measured durations
            # overwrite the previous baseline for the same region.
            jq -s 'reduce .[] as $item ({}; . * $item)' \
              region_timings.json "${files[@]}" > region_timings.merged.json
            mv region_timings.merged.json region_timings.json
          fi
          echo "region_timings.json now tracks $(jq 'length' region_timings.json) region(s)."

      - name: Merge Tile Timings
        run: |
          if [ ! -f tile_timings.json ]; then echo '{}' > tile_timings.json; fi

          shopt -s nullglob
          files=(download_tile_timings/tile-timings-batch-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No tile timing artifacts found - nothing to merge this run."
          else
            jq -s 'reduce .[] as $item ({}; . * $item)' \
              tile_timings.json "${files[@]}" > tile_timings.merged.json
            mv tile_timings.merged.json tile_timings.json
          fi
          echo "tile_timings.json now tracks $(jq 'length' tile_timings.json) quadrant(s)."

      - name: Commit Updated Timings
        run: |
          git add region_timings.json tile_timings.json

          if git diff --cached --quiet; then
            echo "No timing changes to commit."
            exit 0
          fi

          git commit -m "chore: update region and tile processing timings"

          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$TIMINGS_BRANCH"
              if ! git rebase "origin/$TIMINGS_BRANCH"; then
                git rebase --abort
                echo "Rebase conflict on attempt $attempt, retrying in 5s..."
                sleep 5
                continue
              fi
            fi
            if git push origin "HEAD:$TIMINGS_BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Could not push updated timings after 5 attempts."
          exit 1

  combine-land-data:
    # Does the decompress+concatenate work exactly once, so the (up to)
    # NUM_TILE_RUNNERS parallel quadrant jobs below don't each repeat it.
    # This step itself stays cheap: it's pure I/O, no tippecanoe/geometry
    # work, so it doesn't reintroduce the memory problem we're fixing.
    if: ${{ !failure() && !cancelled() }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    steps:
      - name: Download Land Geometry (Standard Workflow Execution)
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-batch-*
          path: download_ndjson
          merge-multiple: true

      - name: Download Land Geometry (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-batch-*
          path: download_ndjson
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Concatenate All Regions into One Global Stream
        run: |
          zcat download_ndjson/*.ndjson.gz > world_land.ndjson
          echo "Combined size:"
          du -h world_land.ndjson

      - name: Upload Combined Land Data
        uses: actions/upload-artifact@v4
        with:
          name: world-land-ndjson
          path: world_land.ndjson
          retention-days: 1

  build-tile-grid:
    # This replaces building the whole planet in one tippecanoe process.
    # Each runner clips the combined land data down to its assigned
    # z=SPLIT_ZOOM quadrant(s) first, then only tiles zoom SPLIT_ZOOM..14
    # for that slice - so both the working-set size and the wall-clock
    # time per runner are bounded by one quadrant's share of the planet,
    # not the whole thing. Because quadrants exactly partition space at
    # z=SPLIT_ZOOM, two different quadrants can never produce the same
    # output tile path - the "several regions land on one tile and
    # overwrite each other" failure mode this replaces simply can't
    # happen here, by construction.
    if: ${{ !failure() && !cancelled() }}
    needs: [combine-land-data, prepare-tile-grid, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.prepare-tile-grid.outputs.batches) }}
    steps:
      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Combined Land Data
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson

      - name: Create Tile BBox Helper Script
        run: |
          cat << 'EOF' > tile_bbox.py
          import math, sys

          z, x, y = int(sys.argv[1]), int(sys.argv[2]), int(sys.argv[3])
          buffer_deg = float(sys.argv[4])
          n = 2 ** z

          def lat(yt):
              return math.degrees(math.atan(math.sinh(math.pi * (1 - 2 * yt / n))))

          xmin, xmax = x / n * 360 - 180, (x + 1) / n * 360 - 180
          ymax, ymin = lat(y), lat(y + 1)

          # Exact bounds: fed to tippecanoe's --clip-bounding-box so this
          # quadrant's OUTPUT never extends past its own tile, whatever
          # the (buffered) input contained.
          exact = f"{xmin} {ymin} {xmax} {ymax}"
          # Buffered bounds: fed to ogr2ogr for the INPUT clip, so
          # tippecanoe's internal tile-edge buffering has a bit of
          # cross-border context instead of a hard, contextless cut.
          buffered = f"{xmin - buffer_deg} {ymin - buffer_deg} {xmax + buffer_deg} {ymax + buffer_deg}"
          print(f"{exact}|{buffered}")
          EOF

      - name: Build Tiles for Assigned Quadrants
        run: |
          TILES=$(echo '${{ toJSON(matrix.batch) }}' | jq -r '.[]')

          echo "### Quadrant Processing Metrics (Batch ${{ strategy.job-index }})" >> $GITHUB_STEP_SUMMARY
          echo "| Quadrant | Time (Seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="tile-timings-batch-${{ strategy.job-index }}.json"
          echo '{}' > "$TIMINGS_FILE"

          rm -rf deploy_folder && mkdir -p deploy_folder

          for TILE in $TILES; do
              Z=$(echo "$TILE" | cut -d/ -f1)
              X=$(echo "$TILE" | cut -d/ -f2)
              Y=$(echo "$TILE" | cut -d/ -f3)
              echo "========================================"
              echo "Processing Quadrant: $TILE"
              echo "========================================"

              START_TIME=$SECONDS

              BBOXES=$(python3 tile_bbox.py "$Z" "$X" "$Y" "$TILE_CLIP_BUFFER_DEG")
              EXACT_BBOX="${BBOXES%%|*}"
              BUFFERED_BBOX="${BBOXES##*|}"

              echo "1. Clipping global land data to this quadrant (with a small cross-border buffer)..."
              ogr2ogr -f GeoJSONSeq quadrant.ndjson "GeoJSONSeq:world_land.ndjson" \
                -clipsrc $BUFFERED_BBOX -makevalid

              if [ ! -s quadrant.ndjson ]; then
                echo "No land in this quadrant - skipping tiling."
              else
                echo "2. Tiling zoom $Z through 14 for this quadrant only..."
                rm -rf quadrant_out
                tippecanoe -P -U 60 --force --no-tile-compression \
                  -e quadrant_out \
                  -l land -Z "$Z" -z 14 --drop-densest-as-needed \
                  --clip-bounding-box="$(echo "$EXACT_BBOX" | tr ' ' ',')" \
                  quadrant.ndjson

                echo "3. Merging this quadrant's tiles into the batch output..."
                [ -d quadrant_out ] && cp -r quadrant_out/. deploy_folder/
              fi

              ELAPSED_TIME=$(( SECONDS - START_TIME ))
              echo "✅ Completed $TILE in $ELAPSED_TIME seconds."
              echo "| \`$TILE\` | $ELAPSED_TIME |" >> $GITHUB_STEP_SUMMARY

              jq --arg tile "$TILE" --argjson t "$ELAPSED_TIME" \
                '. + {($tile): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
                && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"

              rm -rf quadrant.ndjson quadrant_out
          done

          echo "Tile count for this batch:"
          find deploy_folder -name "*.pbf" | wc -l

      - name: Upload Batch Tile Directory
        uses: actions/upload-artifact@v4
        with:
          name: tilegrid-batch-${{ strategy.job-index }}
          path: deploy_folder
          retention-days: 1

      - name: Upload Batch Tile Timings
        uses: actions/upload-artifact@v4
        with:
          name: tile-timings-batch-${{ strategy.job-index }}
          path: "tile-timings-batch-*.json"
          retention-days: 1

  build-lowzoom-overview:
    # z0..SPLIT_ZOOM-1 built once, globally, from the full unclipped
    # dataset - NOT split into quadrants. At this zoom the whole planet
    # is only a handful of tiles anyway (z0=1, z1=4, z2=16), so splitting
    # it would buy nothing, and it needs the complete geometry in one
    # pass to render a coherent, seamless simplified overview.
    if: ${{ !failure() && !cancelled() }}
    needs: [combine-land-data, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Combined Land Data
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson

      - name: Build Whole-World Overview Tiles (z0 through SPLIT_ZOOM-1)
        run: |
          MAX_OVERVIEW_ZOOM=$(( SPLIT_ZOOM - 1 ))
          rm -rf deploy_folder
          tippecanoe -P -U 60 --force --no-tile-compression \
            -e deploy_folder \
            -l land -Z 0 -z "$MAX_OVERVIEW_ZOOM" --drop-densest-as-needed \
            world_land.ndjson

          echo "Overview tile count (z0-$MAX_OVERVIEW_ZOOM):"
          find deploy_folder -name "*.pbf" | wc -l

      - name: Upload Low-Zoom Overview Tiles
        uses: actions/upload-artifact@v4
        with:
          name: lowzoom-overview
          path: deploy_folder
          retention-days: 1

  finalize-deploy:
    # The only job that actually pushes to gh-pages, and it does so with
    # a single commit - see the note in build-tile-grid on why 20 runners
    # committing straight to gh-pages themselves isn't safe: JamesIves'
    # `clean: true` wipes anything not in that run's own folder, so
    # concurrent partial deploys would each erase the previous one's
    # tiles, and concurrent git pushes to the same branch would race the
    # same way region_timings.json's push does. Gathering everything as
    # artifacts first and deploying once avoids both, while still doing
    # all the expensive tiling work in parallel upstream.
    if: ${{ !failure() && !cancelled() }}
    needs: [build-tile-grid, build-lowzoom-overview]
    runs-on: ubuntu-latest
    steps:
      - name: Download Low-Zoom Overview Tiles
        uses: actions/download-artifact@v4
        with:
          name: lowzoom-overview
          path: deploy_folder

      - name: Download and Merge All Quadrant Tile Batches
        uses: actions/download-artifact@v4
        with:
          pattern: tilegrid-batch-*
          path: deploy_folder
          merge-multiple: true

      - name: Tile Count Summary
        run: |
          echo "Total tile count:"
          find deploy_folder -name "*.pbf" | wc -l
          echo "Total size:"
          du -sh deploy_folder

      - name: Prevent Jekyll Processing
        run: touch deploy_folder/.nojekyll

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          target-folder: tiles/land
          branch: gh-pages
          clean: true
          commit-message: "Deploy Raw PBF Tile Directory 🚀"
          single-commit: true