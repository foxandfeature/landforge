name: Build Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      region:
        description: "Manual selection: Specific region or ALL_REGIONS"
        required: true
        default: "europe/germany/niedersachsen"
        type: choice
        options:
          - "ALL_REGIONS"
          - "europe/germany/niedersachsen"

permissions:
  contents: write

jobs:
  # Job 1: Prepare matrix regions from both configuration files
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.regions.outputs.batches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load and Chunk Region Lists
        id: regions
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.region }}" = "ALL_REGIONS" ]; then
            # 1. Split standard regions into batches of 10
            STANDARD=$(jq -c '[_nwise(10)]' regions.json)
            
            # 2. Isolate large regions completely (each gets its own dedicated runner)
            LARGE=$(jq -c '[.[] | [.] ]' large_regions.json)
            
            # 3. Combine both lists together (LARGE first, then STANDARD)
            COMBINED=$(jq -c -n --argjson std "$STANDARD" --argjson lrg "$LARGE" '$lrg + $std')
            echo "batches=$COMBINED" >> "$GITHUB_OUTPUT"
          else
            # For manual single-region runs, wrap the single region into a one-item batch structure
            echo "batches=[[\"${{ github.event.inputs.region }}\"]]" >> "$GITHUB_OUTPUT"
          fi

  # Job 2: Parallel processing of region batches
  build-tiles:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        batch: ${{ fromJSON(needs.prepare.outputs.batches) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GDAL & Tippecanoe
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin sqlite3 build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc) && sudo make install

      - name: Download Global Ocean Data
        run: |
          # Download OSM water polygons (Ocean) once before iterating through the batch (WGS84 / EPSG:4326)
          echo "Downloading OSM water polygons (Ocean)..."
          wget -nv "https://osmdata.openstreetmap.de/download/water-polygons-split-4326.zip" -O ocean.zip
          unzip -q -o ocean.zip -d ocean_data

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Process Region Data (Loop through Batch)
        run: |
          REGIONS=$(echo '${{ toJSON(matrix.batch) }}' | jq -r '.[]')

          # Initialize a markdown table for the GitHub Step Summary to display metrics
          echo "### Region Processing Metrics (Batch ${{ strategy.job-index }})" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (Seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------|" >> $GITHUB_STEP_SUMMARY

          for REGION in $REGIONS; do
              echo "========================================"
              echo "Processing Region: $REGION"
              echo "========================================"
              
              # Record the start time of the current iteration
              START_TIME=$SECONDS
              
              # Download Geofabrik boundaries and inland water shapefile
              wget -nv "https://download.geofabrik.de/${REGION}.poly" -O region.poly
              wget -nv "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" -O region.shp.zip
              
              # Overwrite existing files from previous loop iterations
              unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*"
              
              # Convert Geofabrik .poly structure to a clean WKT string
              python3 poly2wkt.py

              # 1. Clip the global ocean dataset to the local region boundary for maximum performance
              ogr2ogr -f "ESRI Shapefile" local_ocean.shp ocean_data/water-polygons-split-4326/water_polygons.shp -clipsrc boundary.wkt

              # 2. Combine inland water bodies and the clipped ocean dataset into a single shapefile
              ogr2ogr -f "ESRI Shapefile" all_water.shp gis_osm_water_a_free_1.shp
              ogr2ogr -f "ESRI Shapefile" -update -append all_water.shp local_ocean.shp -nln all_water

              # 3. Punch out ALL water structures (Inland + Ocean) from the high-fidelity poly boundary
              ogr2ogr -f GeoJSON land_layer.geojson all_water.shp \
                -dialect sqlite \
                -sql "SELECT ST_Difference(ST_GeomFromText('$(cat boundary.wkt)'), ST_Union(ST_MakeValid(geometry))) AS geometry FROM all_water"

              # Generate Regional MBTiles
              FILENAME=$(echo "${REGION}" | tr '/' '-').mbtiles
              tippecanoe -U=60 -o "$FILENAME" -l land -z 14 -Z 0 --drop-densest-as-needed land_layer.geojson
              
              # Calculate elapsed time and log it
              ELAPSED_TIME=$(( SECONDS - START_TIME ))
              echo "✅ Completed $REGION in $ELAPSED_TIME seconds."
              
              # Append the metric to the GitHub Step Summary table
              echo "| \`$REGION\` | $ELAPSED_TIME |" >> $GITHUB_STEP_SUMMARY
              
              # Clean up workspace files to prepare for the next iteration
              rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* boundary.wkt land_layer.geojson local_ocean.* all_water.*
          done

      - name: Upload Batch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbtiles-batch-${{ strategy.job-index }}
          path: "*.mbtiles"
          retention-days: 1

  # Job 3: Merge MBTiles and convert directly to a single PMTiles file
  deploy-tiles:
    if: ${{ always() }}
    needs: build-tiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tippecanoe & PMTiles CLI
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev wget
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc) && sudo make install
          cd ..
          
          # Download and install the PMTiles CLI tool
          wget https://github.com/protomaps/go-pmtiles/releases/download/v1.23.1/go-pmtiles_1.23.1_linux_amd64.tar.gz
          tar -xf go-pmtiles_1.23.1_linux_amd64.tar.gz
          sudo mv pmtiles /usr/local/bin/

      - name: Download All Generated MBTiles Batches
        uses: actions/download-artifact@v4
        with:
          pattern: mbtiles-batch-*
          path: download_mbtiles
          merge-multiple: true

      - name: Merge and Convert to PMTiles
        run: |
          mkdir -p deploy_folder
          
          # 1. Merge all separate regional MBTiles into one single consolidated MBTiles file
          tile-join -o combined.mbtiles download_mbtiles/*.mbtiles
          
          # 2. Convert the consolidated file directly into a single compressed .pmtiles file
          # This process extracts zero individual tile files, completely bypassing disk space and inode limits
          pmtiles convert combined.mbtiles deploy_folder/land.pmtiles

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          target-folder: tiles/land
          branch: gh-pages
          clean: true
          commit-message: "Deploy Consolidated PMTiles Archive 🚀"
          single-commit: true