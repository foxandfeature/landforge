name: Build and Deploy Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *" # Runs automatically on the 1st of every month
  workflow_dispatch:
    inputs:
      region:
        description: "Region path from regions.json (e.g. europe/germany/niedersachsen), or ALL_REGIONS. GitHub Actions choice inputs can't be populated dynamically from a file, so this is free text - check regions.json for valid values."
        required: true
        default: "ALL_REGIONS"
        type: string
      debug_run_id:
        description: "DEBUG: Run ID to download existing artifacts from (skips tile generation)"
        required: false
        type: string
      debug_resume_at:
        description: "DEBUG: Only used when debug_run_id is set. Where to resume the pipeline from, using that run's artifacts."
        required: false
        type: choice
        options:
          - regions-merge
          - pmtile-generation
        default: regions-merge

permissions:
  contents: write

env:
  # Dedicated orphan branches used purely as data/coordination stores -
  # never merged into main. Defined once here since prepare, build-tiles,
  # cleanup-region-queue, and update-timings all need the same names.
  TIMINGS_BRANCH: region-timings
  QUEUE_BRANCH: region-queue

# Serializes runs so two concurrent workflows never race to commit
# region_timings.json, fight over the tippecanoe/land-data caches, or
# claim from the same region-queue branch (see prepare/build-tiles).
concurrency:
  group: build-deploy-land-tiles
  cancel-in-progress: false

jobs:
  prepare:
    # No longer pre-packs regions into 20 fixed bins. It only computes
    # a priority order (largest estimated region first) and publishes
    # that order as a shared work queue on the region-queue branch.
    # Actual assignment to workers happens live in build-tiles: whichever
    # of the (up to) 20 workers is free next claims whatever is currently
    # at the front of the queue. That adapts to real completion times
    # instead of only the pre-run estimate, which a fixed up-front
    # bin-packing can't do once actual runtimes drift from the estimate.
    runs-on: ubuntu-latest
    outputs:
      worker_ids: ${{ steps.regions.outputs.worker_ids }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Region Timings from Dedicated Data Branch
        # region_timings.json lives on its own orphan branch (see
        # update-timings job) rather than main, so the auto-generated
        # timing commits never clutter the source-code commit history.
        run: |
          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$TIMINGS_BRANCH"
            git show "origin/$TIMINGS_BRANCH:region_timings.json" > region_timings.json
          else
            echo '{}' > region_timings.json
            echo "The $TIMINGS_BRANCH branch doesn't exist yet - starting with empty timings."
          fi

      - name: Sort Regions by Estimated Time and Size the Worker Pool
        id: regions
        env:
          NUM_WORKERS: "20"
          # Only used before region_timings.json has any data at all
          # (i.e. the very first run ever). After that, unseen regions
          # fall back to the average of whatever we've measured so far.
          DEFAULT_ESTIMATE_SECONDS: "180"
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_REGION: ${{ github.event.inputs.region }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          NUM_WORKERS = int(os.environ["NUM_WORKERS"])
          DEFAULT_ESTIMATE = float(os.environ["DEFAULT_ESTIMATE_SECONDS"])
          event_name = os.environ["EVENT_NAME"]
          manual_region = os.environ.get("MANUAL_REGION", "").strip()

          with open("regions.json") as f:
              all_regions_pool = json.load(f)

          with open("region_timings.json") as f:
              timings = json.load(f)

          if event_name == "schedule" or manual_region == "ALL_REGIONS":
              all_regions = all_regions_pool
          else:
              # Free-text input (see workflow_dispatch.inputs.region) - validate
              # against regions.json so a typo fails fast with a clear message
              # instead of a cryptic 404 several minutes into build-tiles.
              if manual_region not in all_regions_pool:
                  sys.exit(
                      f"'{manual_region}' was not found in regions.json. "
                      "Check the exact path (e.g. europe/germany/niedersachsen) "
                      "and try again, or use ALL_REGIONS."
                  )
              all_regions = [manual_region]

          def avg_of(history):
              # region_timings.json stores the last few measured durations
              # per region (see update-timings), not just the latest one,
              # so a single unusually slow/fast download (bad connection,
              # a busy mirror, ...) doesn't swing the estimate on its own.
              if not history:
                  return None
              if not isinstance(history, list):
                  history = [history]
              return sum(history) / len(history)

          region_averages = {r: avg_of(v) for r, v in timings.items()}
          known = [v for v in region_averages.values() if v is not None]
          fallback = (sum(known) / len(known)) if known else DEFAULT_ESTIMATE

          # Sorted largest-first: this list becomes the shared work queue
          # that build-tiles' claim loop pulls from (see the job comment
          # above, and claim_region() in build-tiles for how claiming works).
          # Using an explicit None-check below rather than `or fallback` -
          # a genuinely fast, 0-second-average region must not be
          # silently replaced by the fallback estimate.
          def estimate_for(region):
              avg = region_averages.get(region)
              return avg if avg is not None else fallback

          estimates = [(r, estimate_for(r)) for r in all_regions]
          estimates.sort(key=lambda x: x[1], reverse=True)
          sorted_regions = [r for r, _ in estimates]

          num_workers = min(NUM_WORKERS, len(sorted_regions)) or 1

          print(f"Queued {len(sorted_regions)} region(s) for {num_workers} worker(s):")
          for r, est in estimates:
              print(f"  {r}: ~{est:.0f}s estimated (rolling average)")

          with open("queue.json", "w") as f:
              json.dump(sorted_regions, f)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"worker_ids={json.dumps(list(range(num_workers)))}\n")
          PYEOF

      - name: Publish Region Queue for This Run
        # Always resets the region-queue branch from scratch. Safe to do
        # unconditionally: the top-level `concurrency` group guarantees
        # the previous run (and its queue) fully finished before this one
        # starts, so there's never a live claim to race against here.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$QUEUE_BRANCH"
          git rm -rf . > /dev/null 2>&1 || true
          git add queue.json
          git commit -m "chore: seed region queue ($(jq 'length' queue.json) region(s))"
          git push --force origin "$QUEUE_BRANCH"

  setup-tools:
    runs-on: ubuntu-latest
    outputs:
      tippecanoe-key: ${{ steps.tc-version.outputs.key }}
    steps:
      - name: Determine Tippecanoe Cache Key
        id: tc-version
        run: |
          # Generate a deterministic cache key using Tippecanoe's latest commit hash
          HASH=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)
          echo "key=tippecanoe-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache Tippecanoe Binaries
        id: cache-tippecanoe
        uses: actions/cache@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ steps.tc-version.outputs.key }}

      - name: Build Tippecanoe (Only on Cache Miss)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc)
          mkdir -p ../tippecanoe-bin
          cp tippecanoe tile-join ../tippecanoe-bin/

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Global Land Data
        # Keying on the month (rather than a content hash) forces a fresh
        # download once a month in step with the cron schedule, since the
        # upstream OSM land polygons are refreshed periodically but have
        # no version identifier of their own to key a cache on.
        id: cache-land
        uses: actions/cache@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}

      - name: Download Global Land Data (Only on Cache Miss)
        if: steps.cache-land.outputs.cache-hit != 'true'
        run: |
          # Prints a % (or, if the server doesn't send a Content-Length,
          # just the bytes so far) every 60s while a download is running,
          # so a large multi-hundred-MB file doesn't look stalled in the
          # log. Polls every 1s internally so it never delays a fast
          # download waiting for a 60s tick that already passed.
          download_with_progress() {
            local url="$1"
            local output="$2"
            local log="$3"

            local total_size
            total_size=$(curl -sI --max-time 10 "$url" 2>/dev/null | tr -d '\r' | grep -i '^content-length:' | tail -n1 | awk '{print $2}')

            wget -nv "$url" -O "$output" 2> "$log" &
            local wget_pid=$!

            local elapsed=0
            while kill -0 "$wget_pid" 2>/dev/null; do
              sleep 1
              elapsed=$((elapsed + 1))
              if [ $((elapsed % 60)) -eq 0 ] && kill -0 "$wget_pid" 2>/dev/null; then
                local current_size
                current_size=$(stat -c%s "$output" 2>/dev/null || echo 0)
                if [ -n "$total_size" ] && [ "$total_size" -gt 0 ]; then
                  local pct=$(( current_size * 100 / total_size ))
                  echo "⏳ ${pct}% ($(numfmt --to=iec "$current_size")/$(numfmt --to=iec "$total_size")) - ${elapsed}s elapsed"
                else
                  echo "⏳ $(numfmt --to=iec "$current_size") downloaded so far - ${elapsed}s elapsed (server sent no Content-Length)"
                fi
              fi
            done

            wait "$wget_pid"
          }

          echo "Cache miss! Downloading OSM land polygons from web..."
          attempt=1
          max_attempts=5
          wait_seconds=15
          while true; do
            if download_with_progress "https://osmdata.openstreetmap.de/download/land-polygons-split-4326.zip" land.zip wget_error.log; then
              break
            fi

            http_code=$(grep -oP 'ERROR \K[0-9]+(?=:)' wget_error.log | tail -n1)

            if [ -n "$http_code" ] && [ "$http_code" -ge 400 ] && [ "$http_code" -lt 500 ]; then
              # A 4xx means the server understood the request and rejected
              # it as invalid (e.g. 404) - that points at the URL itself
              # being wrong, not a transient server hiccup, so retrying
              # wouldn't help.
              echo "❌ Download got HTTP $http_code - treating as permanent, not retrying. wget said:"
              cat wget_error.log
              exit 1
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "❌ Failed to download land data after $attempt attempts."
              cat wget_error.log
              exit 1
            fi

            if [ -n "$http_code" ]; then
              echo "⚠️  Attempt $attempt/$max_attempts got HTTP $http_code (server-side). Retrying in ${wait_seconds}s..."
            else
              echo "⚠️  Attempt $attempt/$max_attempts failed (network error, no HTTP response). Retrying in ${wait_seconds}s..."
            fi
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          unzip -q -o land.zip -d land_data
          rm land.zip

  build-tiles:
    # Skip this heavy job entirely if a debug run ID is provided
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.prepare.outputs.worker_ids) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GDAL & Mapshaper
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin nodejs npm
          sudo npm install -g mapshaper

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore Global Land Data from Cache
        uses: actions/cache/restore@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}
          fail-on-cache-miss: true

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          # Read and parse Geofabrik .poly format lines into coordinates
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Configure Git Identity for Queue Claims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process Regions Until the Shared Queue Is Empty
        env:
          # Mapshaper (Node-based) can exceed the default ~2GB heap on
          # large regions when erasing water polygons; this raises the
          # cap so process_region() doesn't crash partway through.
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          echo "### Region Processing Metrics (Worker ${{ matrix.worker }})" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (Seconds) | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------|--------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="timings-worker-${{ matrix.worker }}.json"
          echo '{}' > "$TIMINGS_FILE"
          FAILED_REGIONS=()

          # Claims the region currently at the front of the shared queue
          # (i.e. the largest still-remaining estimate, since prepare
          # publishes the queue pre-sorted descending) and removes it.
          # Optimistic-locking with retry, the same rebase/push-retry
          # idea already used for region_timings.json further down this
          # workflow: if another worker's push wins the race first, we
          # just refetch and claim whatever is now at the front instead.
          claim_region() {
            for attempt in $(seq 1 10); do
              git fetch origin "$QUEUE_BRANCH" -q
              git checkout -q -B "$QUEUE_BRANCH" "origin/$QUEUE_BRANCH"

              local queue_len
              queue_len=$(jq 'length' queue.json)
              if [ "$queue_len" -eq 0 ]; then
                return 1
              fi

              local region
              region=$(jq -r '.[0]' queue.json)
              jq '.[1:]' queue.json > queue.json.next && mv queue.json.next queue.json

              git add queue.json
              git commit -q -m "chore: claim $region"

              if git push origin "$QUEUE_BRANCH" -q 2>/dev/null; then
                echo "$region"
                return 0
              fi

              echo "Lost the claim race on attempt $attempt - retrying..." >&2
              sleep $(( (RANDOM % 4) + 1 ))
            done
            return 1
          }

          # Reports % progress every 60s while a download runs - see the
          # identical helper in setup-tools' land-data download step for
          # why (polls every 1s so it never delays a fast download).
          download_with_progress() {
            local url="$1"
            local output="$2"
            local log="$3"

            local total_size
            total_size=$(curl -sI --max-time 10 "$url" 2>/dev/null | tr -d '\r' | grep -i '^content-length:' | tail -n1 | awk '{print $2}')

            wget -nv "$url" -O "$output" 2> "$log" &
            local wget_pid=$!

            local elapsed=0
            while kill -0 "$wget_pid" 2>/dev/null; do
              sleep 1
              elapsed=$((elapsed + 1))
              if [ $((elapsed % 60)) -eq 0 ] && kill -0 "$wget_pid" 2>/dev/null; then
                local current_size
                current_size=$(stat -c%s "$output" 2>/dev/null || echo 0)
                if [ -n "$total_size" ] && [ "$total_size" -gt 0 ]; then
                  local pct=$(( current_size * 100 / total_size ))
                  echo "⏳ $(basename "$url"): ${pct}% ($(numfmt --to=iec "$current_size")/$(numfmt --to=iec "$total_size")) - ${elapsed}s elapsed"
                else
                  echo "⏳ $(basename "$url"): $(numfmt --to=iec "$current_size") downloaded so far - ${elapsed}s elapsed (server sent no Content-Length)"
                fi
              fi
            done

            wait "$wget_pid"
          }

          fetch_with_retry() {
            local url="$1"
            local output="$2"
            local max_attempts=10
            local wait_seconds=15
            local attempt=1

            while true; do
              if download_with_progress "$url" "$output" wget_error.log; then
                return 0
              fi

              local http_code
              http_code=$(grep -oP 'ERROR \K[0-9]+(?=:)' wget_error.log | tail -n1)

              if [ -n "$http_code" ] && [ "$http_code" -ge 400 ] && [ "$http_code" -lt 500 ]; then
                # A 4xx (most commonly 404) means the server understood the
                # request and rejected it as invalid - that points at the
                # region path itself being wrong or no longer existing at
                # Geofabrik, not at a transient server-side problem, so
                # retrying it wouldn't help and would just hide the real
                # issue behind retry noise.
                echo "❌ $url returned HTTP $http_code - treating as a permanent/misconfiguration error, not retrying. wget said:"
                cat wget_error.log
                return 1
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "❌ Giving up on $url after $attempt attempts."
                cat wget_error.log
                return 1
              fi

              if [ -n "$http_code" ]; then
                echo "⚠️  Attempt $attempt/$max_attempts for $url got HTTP $http_code (server-side). Retrying in ${wait_seconds}s..."
              else
                echo "⚠️  Attempt $attempt/$max_attempts for $url failed (network error, no HTTP response). Retrying in ${wait_seconds}s..."
              fi
              sleep "$wait_seconds"
              attempt=$((attempt + 1))
              wait_seconds=$((wait_seconds * 2))
            done
          }

          process_region() {
            local REGION="$1"
            local START_TIME=$SECONDS

            fetch_with_retry "https://download.geofabrik.de/${REGION}.poly" region.poly || return 1
            fetch_with_retry "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" region.shp.zip || return 1

            unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*"
            python3 poly2wkt.py

            echo "1. Clipping global land polygons to the boundary..."
            # ogr2ogr filters global land polygons on disk to keep RAM usage low
            ogr2ogr -f "ESRI Shapefile" local_land.shp \
              land_data/land-polygons-split-4326/land_polygons.shp \
              -clipsrc "$(cat boundary.wkt)" \
              -makevalid

            echo "2. Filtering glaciers and wetlands out of Geofabrik's water layer..."
            # gis_osm_water_a_free_1 lumps real open water together with
            # glaciers (code 8211, natural=glacier) and wetlands (code
            # 8221, natural=wetland). Neither of those is actually open
            # water, so erasing them from land would incorrectly punch a
            # "sea" hole where there's really solid ice or marshy ground.
            # Filtered out here, before the erase step below ever sees them.
            ogr2ogr -f "ESRI Shapefile" water_filtered.shp gis_osm_water_a_free_1.shp \
              -where "fclass NOT IN ('glacier', 'wetland')"

            echo "3. Punching inland water out of the clipped land (via Mapshaper)..."
            # Explicit `format=geojson ndjson` is required here - without
            # it, mapshaper writes a normal multi-line FeatureCollection
            # object despite the .ndjson filename. combine-land-data later
            # concatenates every region's output into one file, which only
            # stays valid if each line is a standalone Feature (true
            # ndjson/GeoJSON-Text-Sequence) - a concatenated string of
            # FeatureCollection objects breaks tippecanoe's streaming
            # parser (surfaces as "Found ] at top level" / "Reached EOF
            # without all containers being closed").
            mapshaper local_land.shp -erase water_filtered.shp -o land_layer.ndjson format=geojson ndjson

            # Instead of tiling this region on its own, keep the raw erased
            # geometry and compress it. Tiling happens once for the whole
            # world in build-pmtiles - this avoids both the final tile-join
            # fan-in bottleneck AND inconsistent --drop-densest-as-needed
            # decisions across neighbouring regions.
            local FILENAME
            FILENAME=$(echo "${REGION}" | tr '/' '-').ndjson.gz
            echo "4. Compressing erased land geometry for later global tiling..."
            gzip -c land_layer.ndjson > "$FILENAME"

            local ELAPSED_TIME=$(( SECONDS - START_TIME ))
            echo "✅ Completed $REGION in $ELAPSED_TIME seconds."
            echo "| \`$REGION\` | $ELAPSED_TIME | ✅ |" >> $GITHUB_STEP_SUMMARY

            # Record this region's duration so next month's `prepare` job
            # can roll it into that region's average estimate.
            jq --arg region "$REGION" --argjson t "$ELAPSED_TIME" \
              '. + {($region): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
              && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"
            return 0
          }

          while true; do
            REGION=$(claim_region) || break

            echo "========================================"
            echo "Processing Region: $REGION"
            echo "========================================"

            if ! process_region "$REGION"; then
              echo "::error::Region $REGION failed permanently - skipping it and continuing with the rest of the queue."
              echo "| \`$REGION\` | - | ❌ failed |" >> $GITHUB_STEP_SUMMARY
              FAILED_REGIONS+=("$REGION")
            fi

            # Clear temporary space to prevent running out of disk storage across loop iterations
            rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* water_filtered.* boundary.wkt land_layer.ndjson local_land.* wget_error.log
          done

          if [ ${#FAILED_REGIONS[@]} -gt 0 ]; then
            echo "❌ ${#FAILED_REGIONS[@]} region(s) failed permanently: ${FAILED_REGIONS[*]}"
            echo "This worker still uploads everything it DID build (see the steps below) -"
            echo "it only exits non-zero here so the failure is visible in the Actions UI."
            exit 1
          fi

      - name: Upload Worker Artifact
        # Runs even if the step above ultimately failed (some region(s)
        # failed permanently) so every region this worker DID finish
        # still makes it into build-pmtiles. "warn" (not the default
        # "error") because a worker whose very first claim already
        # failed permanently may legitimately produce zero files.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: land-ndjson-worker-${{ matrix.worker }}
          path: "*.ndjson.gz"
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Worker Timings
        # Same "warn" reasoning as the artifact upload above.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: region-timings-worker-${{ matrix.worker }}
          path: "timings-worker-*.json"
          retention-days: 1
          if-no-files-found: warn

  cleanup-region-queue:
    # The region-queue branch only exists to coordinate live claims while
    # build-tiles is running (see prepare/build-tiles above). Once every
    # worker has either emptied it or given up, nothing reads it again -
    # and its commit history (one commit per claimed region) is pure
    # churn with no lasting value, so the whole branch is deleted rather
    # than left sitting around between runs. `prepare` recreates it as a
    # fresh orphan branch from scratch at the start of the next run
    # anyway, so there's nothing here worth preserving in the meantime.
    if: ${{ !cancelled() }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete Region Queue Branch
        run: |
          if git ls-remote --exit-code --heads origin "$QUEUE_BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$QUEUE_BRANCH"
          else
            echo "$QUEUE_BRANCH branch is already gone - nothing to clean up."
          fi

  update-timings:
    # Runs whenever build-tiles actually executed and wasn't cancelled
    # outright. Deliberately NOT gated on it fully succeeding: with
    # fail-fast disabled (and now, per-region failure isolation inside
    # each worker), some regions can fail while others finish fine, and
    # the timings from the successful ones are still worth keeping for
    # next month's balancing. A debug run skips build-tiles entirely, so
    # there's simply nothing new for region_timings.json that time - the
    # merge step below already handles that gracefully.
    if: ${{ !cancelled() }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Per-Worker Region Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every worker failed before finishing a single region, or a debug run skipped build-tiles
        with:
          pattern: region-timings-worker-*
          path: download_region_timings
          merge-multiple: true

      - name: Switch to Dedicated Timings Branch
        # Keeps the timings file's auto-commits off main entirely. If
        # the branch already exists we check it out as-is; otherwise we
        # create it as an orphan (no shared history with main) so it only
        # ever contains this one small file, never a copy of the repo.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            echo "Branch $TIMINGS_BRANCH exists - checking it out."
            git fetch origin "$TIMINGS_BRANCH"
            git checkout -B "$TIMINGS_BRANCH" "origin/$TIMINGS_BRANCH"
          else
            echo "Branch $TIMINGS_BRANCH doesn't exist yet - creating an orphan branch."
            git checkout --orphan "$TIMINGS_BRANCH"
            git rm -rf . > /dev/null
          fi

      - name: Merge Region Timings
        env:
          # How many of the most recent measurements to keep per region.
          # The `prepare` job averages over this history instead of just
          # using the latest value, so a single bad-connection run fades
          # out again rather than permanently skewing the estimate.
          TIMING_HISTORY_LENGTH: "5"
        run: |
          if [ ! -f region_timings.json ]; then echo '{}' > region_timings.json; fi

          python3 << 'PYEOF'
          import json, glob, os

          HISTORY_LENGTH = int(os.environ["TIMING_HISTORY_LENGTH"])

          with open("region_timings.json") as f:
              timings = json.load(f)

          timing_files = sorted(glob.glob("download_region_timings/timings-worker-*.json"))
          if not timing_files:
              print("No region timing artifacts found - nothing to merge this run.")
          else:
              for path in timing_files:
                  with open(path) as f:
                      worker_timings = json.load(f)
                  for region, seconds in worker_timings.items():
                      history = timings.get(region, [])
                      # Older region_timings.json snapshots may still hold a
                      # single number per region - migrate those transparently.
                      if not isinstance(history, list):
                          history = [history]
                      history.append(seconds)
                      timings[region] = history[-HISTORY_LENGTH:]

          with open("region_timings.json", "w") as f:
              json.dump(timings, f)

          print(f"region_timings.json now tracks {len(timings)} region(s).")
          PYEOF

      - name: Commit Updated Timings
        run: |
          git add region_timings.json

          if git diff --cached --quiet; then
            echo "No timing changes to commit."
            exit 0
          fi

          git commit -m "chore: update region processing timings"

          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$TIMINGS_BRANCH"
              if ! git rebase "origin/$TIMINGS_BRANCH"; then
                git rebase --abort
                echo "Rebase conflict on attempt $attempt, retrying in 5s..."
                sleep 5
                continue
              fi
            fi
            if git push origin "HEAD:$TIMINGS_BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Could not push updated timings after 5 attempts."
          exit 1

  combine-land-data:
    # Does the decompress+concatenate work exactly once and hands the
    # result to build-pmtiles as a single artifact. Kept as its own job
    # (rather than inlined into build-pmtiles) so a DEBUG run can pull
    # already-processed region geometry from an older workflow run
    # without re-running build-tiles.
    #
    # Deliberately NOT gated on build-tiles fully succeeding (only on not
    # being cancelled): a permanently-failed region marks its worker job
    # as failed for visibility, but every OTHER region's data still made
    # it into an artifact (see the `if: always()` uploads in build-tiles),
    # and the pmtiles archive should still get built from all of those.
    #
    # Skipped entirely when debug_resume_at is "pmtile-generation": that
    # mode means world-land-ndjson was already combined in debug_run_id's
    # run, so build-pmtiles just downloads it from there directly instead
    # of this job re-fetching per-region artifacts and redoing the merge.
    if: ${{ !cancelled() && !(github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation') }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    steps:
      - name: Download Land Geometry (Standard Workflow Execution)
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-worker-*
          path: download_ndjson
          merge-multiple: true

      - name: Download Land Geometry (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-worker-*
          path: download_ndjson
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Concatenate All Regions into One Global Stream
        run: |
          zcat download_ndjson/*.ndjson.gz > world_land.ndjson
          echo "Combined size:"
          du -h world_land.ndjson

      - name: Upload Combined Land Data
        uses: actions/upload-artifact@v4
        with:
          name: world-land-ndjson
          path: world_land.ndjson
          retention-days: 1

  build-pmtiles:
    # Builds a single global PMTiles archive directly from the combined
    # land geometry - a single-file tile archive that HTTP range-aware
    # clients (e.g. MapLibre GL via the pmtiles.js plugin) can stream
    # directly, so this is also the artifact we publish as a GitHub
    # Release below - no gh-pages hosting involved anymore.
    #
    # `!cancelled()` (rather than the default success()) is what lets
    # this job still run when combine-land-data was itself skipped -
    # exactly what happens on a DEBUG run with
    # debug_resume_at: pmtile-generation (see the download step below,
    # which pulls world-land-ndjson straight from debug_run_id in that case).
    if: ${{ !cancelled() }}
    needs: [combine-land-data, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Combined Land Data (Standard Workflow Execution, or DEBUG Resuming at Regions-Merge)
        # Covers a normal run and a DEBUG run with debug_resume_at set to
        # "regions-merge" - in both cases combine-land-data ran earlier in
        # THIS workflow run and just uploaded world-land-ndjson for us.
        if: ${{ !(github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation') }}
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson

      - name: Download Combined Land Data (DEBUG Mode - Resuming at PMTiles Generation)
        # combine-land-data was skipped this run (see its `if`), so pull
        # the already-combined world-land-ndjson straight from
        # debug_run_id's own run instead.
        if: ${{ github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation' }}
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Build Global PMTiles Archive
        run: |
          # -P reads/writes in parallel; -U 60 logs progress every 60s so
          # a multi-hour global build doesn't look stalled in the log.
          # -Z 0 -z 14 keeps the same zoom range the old per-quadrant
          # build covered; --drop-densest-as-needed lets tippecanoe thin
          # dense areas automatically rather than failing on tile size.
          #
          # No --no-tile-compression here (unlike the old raw-.pbf-folder
          # build): PMTiles stores gzip-compressed tiles per spec, and
          # clients like pmtiles.js/MapLibre GL decompress them on the fly.
          # felt/tippecanoe writes PMTiles natively when -o ends in .pmtiles.
          tippecanoe -P -U 60 --force \
            -o world.pmtiles \
            -l land -Z 0 -z 14 --drop-densest-as-needed \
            world_land.ndjson

          echo "PMTiles archive size:"
          du -h world.pmtiles

      - name: Upload PMTiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-pmtiles
          path: world.pmtiles
          retention-days: 1

  publish-release:
    # Publishes the PMTiles archive as an asset on a single, rolling
    # GitHub Release instead of deploying to gh-pages. GitHub Release
    # assets are served from a CDN that honours HTTP Range requests,
    # which pmtiles.js/MapLibre GL need to stream chunks out of the
    # archive on demand instead of downloading the whole file up front.
    if: ${{ !cancelled() }}
    needs: [build-pmtiles]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: land-tiles-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download PMTiles Artifact
        uses: actions/download-artifact@v4
        with:
          name: world-pmtiles
          path: .

      - name: Create Release (If It Doesn't Exist Yet)
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Global Land Tiles (PMTiles)" \
              --notes "Automatically generated global land PMTiles archive, rebuilt monthly. The asset below is overwritten in place on every run - use the /releases/latest/download/ URL to always fetch the newest build." \
              --latest
          fi

      - name: Upload PMTiles Asset (Overwrite Existing)
        run: |
          gh release upload "$RELEASE_TAG" world.pmtiles --clobber