name: Build and Deploy Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *" # Runs automatically on the 1st of every month
  workflow_dispatch:
    inputs:
      region:
        description: "Region path from regions.json (e.g. europe/germany/niedersachsen), or ALL_REGIONS. GitHub Actions choice inputs can't be populated dynamically from a file, so this is free text - check regions.json for valid values."
        required: true
        default: "ALL_REGIONS"
        type: string
      debug_run_id:
        description: "DEBUG: Run ID to download existing artifacts (skips tile generation)"
        required: false
        type: string

permissions:
  contents: write

# Serializes runs so two concurrent workflows never race to commit
# region_timings.json or fight over the tippecanoe/land-data caches.
concurrency:
  group: build-deploy-land-tiles
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.regions.outputs.batches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Region Timings from Dedicated Data Branch
        # region_timings.json lives on its own orphan branch (see
        # update-timings job) rather than main, so the auto-generated
        # timing commits never clutter the source-code commit history.
        env:
          TIMINGS_BRANCH: region-timings
        run: |
          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$TIMINGS_BRANCH"
            git show "origin/$TIMINGS_BRANCH:region_timings.json" > region_timings.json
          else
            echo '{}' > region_timings.json
            echo "The $TIMINGS_BRANCH branch doesn't exist yet - starting with empty timings."
          fi

      - name: Balance Regions Across 20 Runners by Estimated Time
        id: regions
        env:
          NUM_RUNNERS: "20"
          # Only used before region_timings.json has any data at all
          # (i.e. the very first run ever). After that, unseen regions
          # fall back to the average of whatever we've measured so far.
          DEFAULT_ESTIMATE_SECONDS: "180"
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_REGION: ${{ github.event.inputs.region }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          NUM_RUNNERS = int(os.environ["NUM_RUNNERS"])
          DEFAULT_ESTIMATE = float(os.environ["DEFAULT_ESTIMATE_SECONDS"])
          event_name = os.environ["EVENT_NAME"]
          manual_region = os.environ.get("MANUAL_REGION", "").strip()

          with open("regions.json") as f:
              all_regions_pool = json.load(f)

          with open("region_timings.json") as f:
              timings = json.load(f)

          if event_name == "schedule" or manual_region == "ALL_REGIONS":
              all_regions = all_regions_pool
          else:
              # Free-text input (see workflow_dispatch.inputs.region) - validate
              # against regions.json so a typo fails fast with a clear message
              # instead of a cryptic 404 several minutes into build-tiles.
              if manual_region not in all_regions_pool:
                  sys.exit(
                      f"'{manual_region}' was not found in regions.json. "
                      "Check the exact path (e.g. europe/germany/niedersachsen) "
                      "and try again, or use ALL_REGIONS."
                  )
              all_regions = [manual_region]

          fallback = (sum(timings.values()) / len(timings)) if timings else DEFAULT_ESTIMATE
          estimates = [(r, timings.get(r, fallback)) for r in all_regions]

          # Longest-Processing-Time-first greedy bin packing: sort the
          # heaviest (slowest, by last known duration) regions first, and
          # always drop the next one onto whichever runner currently has
          # the smallest total. This keeps all 20 runners' *estimated
          # wall-clock time* close to equal, instead of just splitting the
          # region *count* evenly like the old `_nwise(20)` chunking did.
          estimates.sort(key=lambda x: x[1], reverse=True)

          num_bins = min(NUM_RUNNERS, len(estimates)) or 1
          bins = [[] for _ in range(num_bins)]
          totals = [0.0] * num_bins

          for region, est in estimates:
              idx = totals.index(min(totals))
              bins[idx].append(region)
              totals[idx] += est

          print(f"Packed {len(estimates)} region(s) into {num_bins} runner(s):")
          for i, (b, t) in enumerate(zip(bins, totals)):
              print(f"  runner {i}: {len(b)} region(s), ~{t:.0f}s estimated -> {b}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batches={json.dumps(bins)}\n")
          PYEOF

  setup-tools:
    runs-on: ubuntu-latest
    outputs:
      tippecanoe-key: ${{ steps.tc-version.outputs.key }}
    steps:
      - name: Determine Tippecanoe Cache Key
        id: tc-version
        run: |
          # Generate a deterministic cache key using Tippecanoe's latest commit hash
          HASH=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)
          echo "key=tippecanoe-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache Tippecanoe Binaries
        id: cache-tippecanoe
        uses: actions/cache@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ steps.tc-version.outputs.key }}

      - name: Build Tippecanoe (Only on Cache Miss)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc)
          mkdir -p ../tippecanoe-bin
          cp tippecanoe tile-join ../tippecanoe-bin/

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Global Land Data
        id: cache-land
        uses: actions/cache@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}

      - name: Download Global Land Data (Only on Cache Miss)
        if: steps.cache-land.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss! Downloading OSM land polygons from web..."
          attempt=1
          max_attempts=5
          wait_seconds=15
          until wget -nv "https://osmdata.openstreetmap.de/download/land-polygons-split-4326.zip" -O land.zip; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "❌ Failed to download land data after $attempt attempts."
              exit 1
            fi
            echo "⚠️  Attempt $attempt/$max_attempts failed. Retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          unzip -q -o land.zip -d land_data
          rm land.zip

  build-tiles:
    # Skip this heavy job entirely if a debug run ID is provided
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.prepare.outputs.batches) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GDAL & Mapshaper
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin nodejs npm
          sudo npm install -g mapshaper

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore Global Land Data from Cache
        uses: actions/cache/restore@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}
          fail-on-cache-miss: true

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          # Read and parse Geofabrik .poly format lines into coordinates
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          # Close the polygon loop if required
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          # Format structures cleanly into a single valid WKT geometry string
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Process Region Data (Loop through Batch)
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          REGIONS=$(echo '${{ toJSON(matrix.batch) }}' | jq -r '.[]')

          echo "### Region Processing Metrics (Batch ${{ strategy.job-index }})" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (Seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="timings-batch-${{ strategy.job-index }}.json"
          echo '{}' > "$TIMINGS_FILE"

          fetch_with_retry() {
            local url="$1"
            local output="$2"
            local max_attempts=5
            local wait_seconds=15
            local attempt=1

            until wget -nv "$url" -O "$output"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "❌ Giving up on $url after $attempt attempts."
                return 1
              fi
              echo "⚠️  Attempt $attempt/$max_attempts for $url failed. Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
              attempt=$((attempt + 1))
              wait_seconds=$((wait_seconds * 2))
            done
          }

          for REGION in $REGIONS; do
              echo "========================================"
              echo "Processing Region: $REGION"
              echo "========================================"
              
              START_TIME=$SECONDS
              
              fetch_with_retry "https://download.geofabrik.de/${REGION}.poly" region.poly || exit 1
              fetch_with_retry "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" region.shp.zip || exit 1
              
              unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*"
              python3 poly2wkt.py

              echo "1. Clipping global land polygons to the boundary..."
              # ogr2ogr filters global land polygons on disk to keep RAM usage low
              ogr2ogr -f "ESRI Shapefile" local_land.shp \
                land_data/land-polygons-split-4326/land_polygons.shp \
                -clipsrc "$(cat boundary.wkt)" \
                -makevalid

              echo "2. Punching inland water out of the clipped land (via Mapshaper)..."
              mapshaper local_land.shp -erase gis_osm_water_a_free_1.shp -o land_layer.ndjson

              # Instead of tiling this region on its own, keep the raw erased
              # geometry and compress it. Tiling happens once for the whole
              # world in build-pmtiles - this avoids both the final tile-join
              # fan-in bottleneck AND inconsistent --drop-densest-as-needed
              # decisions across neighbouring regions.
              FILENAME=$(echo "${REGION}" | tr '/' '-').ndjson.gz
              echo "3. Compressing erased land geometry for later global tiling..."
              gzip -c land_layer.ndjson > "$FILENAME"
              
              ELAPSED_TIME=$(( SECONDS - START_TIME ))
              echo "✅ Completed $REGION in $ELAPSED_TIME seconds."
              
              echo "| \`$REGION\` | $ELAPSED_TIME |" >> $GITHUB_STEP_SUMMARY

              # Record this region's duration so next month's `prepare` job
              # can balance runners by actual measured time, not just count.
              jq --arg region "$REGION" --argjson t "$ELAPSED_TIME" \
                '. + {($region): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
                && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"
              
              # Clear temporary space to prevent running out of disk storage across batch loops
              rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* boundary.wkt land_layer.ndjson local_land.*
          done

      - name: Upload Batch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: land-ndjson-batch-${{ strategy.job-index }}
          path: "*.ndjson.gz"
          retention-days: 1

      - name: Upload Batch Timings
        uses: actions/upload-artifact@v4
        with:
          name: region-timings-batch-${{ strategy.job-index }}
          path: "timings-batch-*.json"
          retention-days: 1

  update-timings:
    # Runs whenever build-tiles actually executed and wasn't cancelled
    # outright. Deliberately NOT gated on it fully succeeding: with
    # fail-fast disabled, some batches can fail while others finish fine,
    # and the timings from the successful ones are still worth keeping
    # for next month's balancing. A debug run skips build-tiles entirely,
    # so there's simply nothing new for region_timings.json that time -
    # the merge step below already handles that gracefully.
    if: ${{ !cancelled() }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    env:
      TIMINGS_BRANCH: region-timings
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Per-Batch Region Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every batch failed, or a debug run skipped build-tiles
        with:
          pattern: region-timings-batch-*
          path: download_region_timings
          merge-multiple: true

      - name: Switch to Dedicated Timings Branch
        # Keeps the timings file's auto-commits off main entirely. If
        # the branch already exists we check it out as-is; otherwise we
        # create it as an orphan (no shared history with main) so it only
        # ever contains this one small file, never a copy of the repo.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            echo "Branch $TIMINGS_BRANCH exists - checking it out."
            git fetch origin "$TIMINGS_BRANCH"
            git checkout -B "$TIMINGS_BRANCH" "origin/$TIMINGS_BRANCH"
          else
            echo "Branch $TIMINGS_BRANCH doesn't exist yet - creating an orphan branch."
            git checkout --orphan "$TIMINGS_BRANCH"
            git rm -rf . > /dev/null
          fi

      - name: Merge Region Timings
        run: |
          if [ ! -f region_timings.json ]; then echo '{}' > region_timings.json; fi

          shopt -s nullglob
          files=(download_region_timings/timings-batch-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No region timing artifacts found - nothing to merge this run."
          else
            # Later files win on key collision, so freshly-measured durations
            # overwrite the previous baseline for the same region.
            jq -s 'reduce .[] as $item ({}; . * $item)' \
              region_timings.json "${files[@]}" > region_timings.merged.json
            mv region_timings.merged.json region_timings.json
          fi
          echo "region_timings.json now tracks $(jq 'length' region_timings.json) region(s)."

      - name: Commit Updated Timings
        run: |
          git add region_timings.json

          if git diff --cached --quiet; then
            echo "No timing changes to commit."
            exit 0
          fi

          git commit -m "chore: update region processing timings"

          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$TIMINGS_BRANCH"
              if ! git rebase "origin/$TIMINGS_BRANCH"; then
                git rebase --abort
                echo "Rebase conflict on attempt $attempt, retrying in 5s..."
                sleep 5
                continue
              fi
            fi
            if git push origin "HEAD:$TIMINGS_BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Could not push updated timings after 5 attempts."
          exit 1

  combine-land-data:
    # Does the decompress+concatenate work exactly once and hands the
    # result to build-pmtiles as a single artifact. Kept as its own job
    # (rather than inlined into build-pmtiles) so a DEBUG run can pull
    # already-processed region geometry from an older workflow run
    # without re-running build-tiles.
    if: ${{ !failure() && !cancelled() }}
    needs: [build-tiles]
    runs-on: ubuntu-latest
    steps:
      - name: Download Land Geometry (Standard Workflow Execution)
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-batch-*
          path: download_ndjson
          merge-multiple: true

      - name: Download Land Geometry (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: land-ndjson-batch-*
          path: download_ndjson
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Concatenate All Regions into One Global Stream
        run: |
          zcat download_ndjson/*.ndjson.gz > world_land.ndjson
          echo "Combined size:"
          du -h world_land.ndjson

      - name: Upload Combined Land Data
        uses: actions/upload-artifact@v4
        with:
          name: world-land-ndjson
          path: world_land.ndjson
          retention-days: 1

  build-pmtiles:
    # Builds a single global PMTiles archive directly from the combined
    # land geometry - no more splitting into z=SPLIT_ZOOM quadrants and
    # merging directory trees of loose .pbf files back together. PMTiles
    # is a single-file tile archive that HTTP range-aware clients (e.g.
    # MapLibre GL via the pmtiles.js plugin) can stream directly, so this
    # is also the artifact we publish as a GitHub Release below - no
    # gh-pages hosting involved anymore.
    if: ${{ !failure() && !cancelled() }}
    needs: [combine-land-data, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Combined Land Data
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson

      - name: Build Global PMTiles Archive
        run: |
          # No --no-tile-compression here (unlike the old raw-.pbf-folder
          # build): PMTiles stores gzip-compressed tiles per spec, and
          # clients like pmtiles.js/MapLibre GL decompress them on the fly.
          # felt/tippecanoe writes PMTiles natively when -o ends in .pmtiles.
          tippecanoe -P -U 60 --force \
            -o world.pmtiles \
            -l land -Z 0 -z 14 --drop-densest-as-needed \
            world_land.ndjson

          echo "PMTiles archive size:"
          du -h world.pmtiles

      - name: Upload PMTiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-pmtiles
          path: world.pmtiles
          retention-days: 1

  publish-release:
    # Publishes the PMTiles archive as an asset on a single, rolling
    # GitHub Release instead of deploying to gh-pages. GitHub Release
    # assets are served from a CDN that honours HTTP Range requests,
    # which pmtiles.js/MapLibre GL need to stream chunks out of the
    # archive on demand instead of downloading the whole file up front.
    if: ${{ !failure() && !cancelled() }}
    needs: [build-pmtiles]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: land-tiles-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download PMTiles Artifact
        uses: actions/download-artifact@v4
        with:
          name: world-pmtiles
          path: .

      - name: Create Release (If It Doesn't Exist Yet)
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Global Land Tiles (PMTiles)" \
              --notes "Automatically generated global land PMTiles archive, rebuilt monthly. The asset below is overwritten in place on every run - use the /releases/latest/download/ URL to always fetch the newest build." \
              --latest
          fi

      - name: Upload PMTiles Asset (Overwrite Existing)
        run: |
          gh release upload "$RELEASE_TAG" world.pmtiles --clobber