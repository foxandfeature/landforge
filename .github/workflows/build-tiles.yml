name: Build and Deploy Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *" # Runs automatically on the 1st of every month
  workflow_dispatch:
    inputs:
      region:
        description: "Region path from Geofabrik's index (e.g. europe/germany/niedersachsen), or ALL_REGIONS. GitHub Actions choice inputs can't be populated dynamically from a live index, so this is free text - browse https://download.geofabrik.de to find the exact path of a region that has its own free shapefile (not a multi-region bundle like 'US Midwest')."
        required: true
        default: "ALL_REGIONS"
        type: string
      debug_run_id:
        description: "DEBUG: Run ID to download existing artifacts from (skips tile generation)"
        required: false
        type: string
      debug_resume_at:
        description: "DEBUG: Only used when debug_run_id is set. Where to resume the pipeline from, using that run's artifacts."
        required: false
        type: choice
        options:
          - regions-merge
          - pmtile-generation
        default: regions-merge

permissions:
  contents: write

env:
  # Dedicated orphan branches used purely as data/coordination stores, never
  # merged into main. TIMINGS_BRANCH is shared by prepare and update-timings.
  # QUEUE_BRANCH coordinates build-tiles-ndjson's per-region claims;
  # TILING_QUEUE_BRANCH is a second, independent queue that coordinates
  # build-tiles-highzoom's claims. Two separate queues (rather than reusing
  # one) because tiling cost doesn't track ndjson-build cost well - a region
  # cheap to clip/erase can be slow to tile (e.g. a dense archipelago) - so
  # the set of regions a worker claims in one phase would be a poor,
  # unrebalanceable assignment for the other phase.
  TIMINGS_BRANCH: region-timings
  QUEUE_BRANCH: region-queue
  TILING_QUEUE_BRANCH: region-tiling-queue

# Serializes runs so two concurrent workflows never race over
# region_timings.json, the tippecanoe/land-data caches, or region-queue.
concurrency:
  group: build-deploy-land-tiles
  cancel-in-progress: false

jobs:
  prepare:
    # Only computes a priority order (largest estimated region first) and
    # publishes it as a shared work queue on the region-queue branch. Actual
    # assignment happens live in build-tiles-ndjson: whichever of the (up to) 20
    # workers is free next claims whatever is at the front of the queue -
    # that adapts to real completion times instead of a fixed up-front
    # bin-packing that can't react once runtimes drift from the estimate.
    runs-on: ubuntu-latest
    outputs:
      worker_ids: ${{ steps.regions.outputs.worker_ids }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Region Timings from Dedicated Data Branch
        # region_timings.json lives on its own orphan branch (see
        # update-timings) so its auto-generated commits never clutter main.
        run: |
          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$TIMINGS_BRANCH"
            git show "origin/$TIMINGS_BRANCH:region_timings.json" > region_timings.json
          else
            echo '{}' > region_timings.json
            echo "The $TIMINGS_BRANCH branch doesn't exist yet - starting with empty timings."
          fi

      - name: Fetch Geofabrik's Region Index
        # Pulls Geofabrik's own machine-readable extract index (schema at
        # https://download.geofabrik.de/technical.html) instead of a
        # repo-committed list, so the candidate region set never drifts out
        # of date. The URL is fixed and trusted, so any failure here is
        # transient - a plain retry, not the permanent-vs-4xx split used for
        # the per-region downloads further down.
        run: |
          attempt=1
          max_attempts=5
          wait_seconds=15
          until curl -sSL --fail --max-time 60 -o geofabrik_index.json \
              "https://download.geofabrik.de/index-v1-nogeom.json"; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Failed to download the Geofabrik region index after $attempt attempts."
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts failed to fetch the Geofabrik index. Retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          echo "Downloaded Geofabrik region index ($(du -h geofabrik_index.json | cut -f1))."

      - name: Sort Regions by Estimated Time and Size the Worker Pool
        id: regions
        env:
          NUM_WORKERS: "20"
          # Only used before region_timings.json has any data (the very
          # first run ever); after that, unseen regions fall back to the
          # average of whatever has been measured so far.
          DEFAULT_ESTIMATE_SECONDS: "180"
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_REGION: ${{ github.event.inputs.region }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          NUM_WORKERS = int(os.environ["NUM_WORKERS"])
          DEFAULT_ESTIMATE = float(os.environ["DEFAULT_ESTIMATE_SECONDS"])
          event_name = os.environ["EVENT_NAME"]
          manual_region = os.environ.get("MANUAL_REGION", "").strip()

          GEOFABRIK_BASE = "https://download.geofabrik.de/"
          SHP_SUFFIX = "-latest-free.shp.zip"

          def region_path_from_shp_url(shp_url):
              # properties.id is only the leaf slug (e.g. "niedersachsen"),
              # not the full "continent/country/region" download path -
              # derive that from the shp URL instead of re-walking the
              # parent chain by hand.
              if not (shp_url.startswith(GEOFABRIK_BASE) and shp_url.endswith(SHP_SUFFIX)):
                  sys.exit(f"Unexpected Geofabrik shp URL shape, please check the index format: {shp_url}")
              return shp_url[len(GEOFABRIK_BASE):-len(SHP_SUFFIX)]

          with open("geofabrik_index.json") as f:
              geofabrik_features = [
                  feat["properties"] for feat in json.load(f)["features"]
              ]

          # A region qualifies as a tileable leaf if nothing else lists it as
          # `parent` AND it ships a free shapefile. The shapefile check is
          # what filters out Geofabrik's "Special Sub Regions" (US Midwest,
          # DACH, etc.) - those are leaves too, but re-cut already-covered
          # countries along overlapping lines and have no "shp" url.
          # Filtering on that (not hardcoded bundle names) auto-excludes any
          # future bundle Geofabrik adds, and matches what build-tiles-ndjson
          # actually needs: a `-latest-free.shp.zip` to download.
          parents_with_children = {p["parent"] for p in geofabrik_features if p.get("parent")}
          all_regions_pool = sorted(
              region_path_from_shp_url(p["urls"]["shp"])
              for p in geofabrik_features
              if p["id"] not in parents_with_children and "shp" in p.get("urls", {})
          )

          # Regions Geofabrik's index lists a "shp" URL for, but whose file is
          # actually broken/unavailable server-side right now (e.g. enfield,
          # 2026-07: "End-of-central-directory signature not found" despite
          # HTTP 200). Hand-maintained in known_broken_regions.json; remove
          # an entry once Geofabrik serves it correctly again. Only excluded
          # from the automatic ALL_REGIONS batch - an explicit manual run
          # against that region is still allowed, just with a warning.
          with open("known_broken_regions.json") as f:
              known_broken = set(json.load(f))

          with open("region_timings.json") as f:
              timings = json.load(f)

          if event_name == "schedule" or manual_region == "ALL_REGIONS":
              all_regions = [r for r in all_regions_pool if r not in known_broken]
              skipped = [r for r in all_regions_pool if r in known_broken]
              if skipped:
                  print(f"Skipping {len(skipped)} known-broken region(s) per known_broken_regions.json: {skipped}")
          else:
              # Validate free-text input against the Geofabrik-derived pool
              # so a typo fails fast instead of a cryptic 404 minutes later.
              if manual_region not in all_regions_pool:
                  sys.exit(
                      f"'{manual_region}' was not found among Geofabrik's leaf regions "
                      "(or it's a Special Sub Region bundle without its own shapefile, "
                      "like 'US Midwest', which this pipeline skips). "
                      "Check the exact path (e.g. europe/germany/niedersachsen) against "
                      "https://download.geofabrik.de and try again, or use ALL_REGIONS."
                  )
              if manual_region in known_broken:
                  print(
                      f"'{manual_region}' is listed in known_broken_regions.json - "
                      "running it anyway since it was explicitly requested. Remove it "
                      "from that file if Geofabrik has fixed the shapefile."
                  )
              all_regions = [manual_region]

          def avg_of(history):
              # Averaging the last few measured durations (see
              # update-timings), not just the latest one, keeps a single
              # unusually slow/fast run from swinging the estimate alone.
              if not history:
                  return None
              if not isinstance(history, list):
                  history = [history]
              return sum(history) / len(history)

          region_averages = {r: avg_of(v) for r, v in timings.items()}
          known = [v for v in region_averages.values() if v is not None]
          fallback = (sum(known) / len(known)) if known else DEFAULT_ESTIMATE

          # Sorted largest-first: this becomes the shared queue
          # build-tiles-ndjson's claim loop pulls from. Explicit None-check (not `or fallback`)
          # so a genuinely fast, 0-second-average region isn't silently
          # replaced by the fallback estimate.
          def estimate_for(region):
              avg = region_averages.get(region)
              return avg if avg is not None else fallback

          estimates = [(r, estimate_for(r)) for r in all_regions]
          estimates.sort(key=lambda x: x[1], reverse=True)
          sorted_regions = [r for r, _ in estimates]

          num_workers = min(NUM_WORKERS, len(sorted_regions)) or 1

          print(f"Queued {len(sorted_regions)} region(s) for {num_workers} worker(s):")
          for r, est in estimates:
              print(f"  {r}: ~{est:.0f}s estimated (rolling average)")

          with open("queue.json", "w") as f:
              json.dump(sorted_regions, f)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"worker_ids={json.dumps(list(range(num_workers)))}\n")
          PYEOF

      - name: Publish Region Queue for This Run
        # Always resets region-queue from scratch. Safe unconditionally: the
        # top-level `concurrency` group guarantees the previous run's queue
        # fully finished before this one starts.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$QUEUE_BRANCH"
          git rm -rf . > /dev/null 2>&1 || true
          git add queue.json
          git commit -m "chore: seed region queue ($(jq 'length' queue.json) region(s))"
          git push --force origin "$QUEUE_BRANCH"

  setup-tools:
    runs-on: ubuntu-latest
    outputs:
      tippecanoe-key: ${{ steps.tc-version.outputs.key }}
    steps:
      - name: Determine Tippecanoe Cache Key
        id: tc-version
        run: |
          # Generate a deterministic cache key using Tippecanoe's latest commit hash
          HASH=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)
          echo "key=tippecanoe-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache Tippecanoe Binaries
        id: cache-tippecanoe
        uses: actions/cache@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ steps.tc-version.outputs.key }}

      - name: Build Tippecanoe (Only on Cache Miss)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc)
          mkdir -p ../tippecanoe-bin
          cp tippecanoe tile-join ../tippecanoe-bin/

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Global Land Data
        # Keyed on month (not a content hash) to force a fresh download in
        # step with the cron schedule - the upstream OSM land polygons have
        # no version identifier of their own to key a cache on.
        id: cache-land
        uses: actions/cache@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}

      - name: Download Global Land Data (Only on Cache Miss)
        if: steps.cache-land.outputs.cache-hit != 'true'
        run: |
          # Best-effort remote size for the progress readout: ranged GET
          # first (its Content-Range always ends in the true total size,
          # unlike a redirect page's tiny Content-Length), HEAD as fallback.
          remote_size() {
            local url="$1" size
            size=$(curl -sL --max-time 15 -r 0-0 -D - -o /dev/null "$url" 2>/dev/null \
              | tr -d '\r' | grep -i '^content-range:' | tail -n1 | sed 's#.*/##')
            if ! [[ "$size" =~ ^[0-9]+$ ]]; then
              size=$(curl -sIL --max-time 15 "$url" 2>/dev/null | tr -d '\r' \
                | awk 'BEGIN{IGNORECASE=1} /^HTTP\//{cl=""} /^content-length:/{cl=$2} END{print cl}')
            fi
            [[ "$size" =~ ^[0-9]+$ ]] && echo "$size"
          }

          # Logs progress every 60s so a large download doesn't look stalled;
          # polls every 1s so a fast download isn't held up waiting for a tick.
          download_with_progress() {
            local url="$1" output="$2" log="$3"
            local total_size; total_size=$(remote_size "$url")

            wget -nv "$url" -O "$output" 2> "$log" &
            local wget_pid=$! elapsed=0
            while kill -0 "$wget_pid" 2>/dev/null; do
              sleep 1
              elapsed=$((elapsed + 1))
              if [ $((elapsed % 60)) -eq 0 ] && kill -0 "$wget_pid" 2>/dev/null; then
                local now; now=$(stat -c%s "$output" 2>/dev/null || echo 0)
                if [ -n "$total_size" ] && [ "$total_size" -gt 0 ]; then
                  echo "$(( now * 100 / total_size ))% ($(numfmt --to=iec "$now")/$(numfmt --to=iec "$total_size")) - ${elapsed}s elapsed"
                else
                  echo "$(numfmt --to=iec "$now") downloaded - ${elapsed}s elapsed (server sent no size)"
                fi
              fi
            done
            wait "$wget_pid"
          }

          echo "Cache miss! Downloading OSM land polygons from web..."
          attempt=1
          max_attempts=5
          wait_seconds=15
          while true; do
            if download_with_progress "https://osmdata.openstreetmap.de/download/land-polygons-split-4326.zip" land.zip wget_error.log; then
              break
            fi

            http_code=$(grep -oP 'ERROR \K[0-9]+(?=:)' wget_error.log | tail -n1)

            if [ -n "$http_code" ] && [ "$http_code" -ge 400 ] && [ "$http_code" -lt 500 ]; then
              # 4xx means a wrong URL, not a transient hiccup - don't retry.
              echo "Download got HTTP $http_code - treating as permanent, not retrying. wget said:"
              cat wget_error.log
              exit 1
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Failed to download land data after $attempt attempts."
              cat wget_error.log
              exit 1
            fi

            if [ -n "$http_code" ]; then
              echo "Attempt $attempt/$max_attempts got HTTP $http_code (server-side). Retrying in ${wait_seconds}s..."
            else
              echo "Attempt $attempt/$max_attempts failed (network error, no HTTP response). Retrying in ${wait_seconds}s..."
            fi
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          unzip -q -o land.zip -d land_data
          rm land.zip

  build-tiles-ndjson:
    # Phase 1 of 2 (see build-tiles-highzoom below): claims regions from
    # region-queue and turns each into clipped, water-erased NDJSON. Skip
    # this heavy job entirely if a debug run ID is provided.
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.prepare.outputs.worker_ids) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GDAL & Mapshaper
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin nodejs npm
          sudo npm install -g mapshaper

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore Global Land Data from Cache
        uses: actions/cache/restore@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}
          fail-on-cache-miss: true

      - name: Install Per-Region Artifact Uploader
        # GitHub's actions/upload-artifact step can't be parameterized by a
        # name computed at runtime inside a bash loop (steps are static at
        # workflow-parse time), but this job needs to publish one artifact
        # per region (not one bundle per worker) so build-tiles-highzoom can
        # claim-and-fetch exactly the region it needs instead of every
        # worker bulk-downloading every region's data. @actions/artifact is
        # the same SDK actions/upload-artifact itself wraps, called directly
        # instead - it only needs the ACTIONS_RUNTIME_TOKEN/URL every job
        # step already has, no extra secrets.
        run: npm install --no-save @actions/artifact@^2

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          # Read and parse Geofabrik .poly format lines into coordinates
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Configure Git Identity for Queue Claims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Forge the Land Until the Shared Queue Is Empty
        env:
          # Mapshaper (Node) blows past the ~2GB default heap on large
          # regions during erase; raise the limit so build_region_ndjson doesn't crash.
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          echo "### Forge Log — Worker ${{ matrix.worker }}" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (s) | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="timings-ndjson-worker-${{ matrix.worker }}.json"
          echo '{}' > "$TIMINGS_FILE"
          FAILED_REGIONS=()

          # Claims the region at the front of the shared queue (largest
          # remaining estimate first) and removes it. Optimistic lock +
          # retry: if another worker wins the push race, refetch and claim
          # whatever is now at the front.
          claim_region() {
            for attempt in $(seq 1 10); do
              git fetch origin "$QUEUE_BRANCH" -q
              git checkout -q -B "$QUEUE_BRANCH" "origin/$QUEUE_BRANCH"

              local queue_len region
              queue_len=$(jq 'length' queue.json)
              if [ "$queue_len" -eq 0 ]; then
                return 1
              fi

              region=$(jq -r '.[0]' queue.json)
              jq '.[1:]' queue.json > queue.json.next && mv queue.json.next queue.json

              git add queue.json
              git commit -q -m "chore: claim $region"

              if git push origin "$QUEUE_BRANCH" -q 2>/dev/null; then
                echo "$region"
                return 0
              fi
              echo "Lost the claim race on attempt $attempt, retrying..." >&2
              sleep $(( (RANDOM % 4) + 1 ))
            done
            return 1
          }

          # Best-effort remote size for the progress readout: ranged GET
          # first (its Content-Range always ends in the true total size,
          # unlike a redirect page's tiny Content-Length), HEAD as fallback.
          remote_size() {
            local url="$1" size
            size=$(curl -sL --max-time 15 -r 0-0 -D - -o /dev/null "$url" 2>/dev/null \
              | tr -d '\r' | grep -i '^content-range:' | tail -n1 | sed 's#.*/##')
            if ! [[ "$size" =~ ^[0-9]+$ ]]; then
              size=$(curl -sIL --max-time 15 "$url" 2>/dev/null | tr -d '\r' \
                | awk 'BEGIN{IGNORECASE=1} /^HTTP\//{cl=""} /^content-length:/{cl=$2} END{print cl}')
            fi
            [[ "$size" =~ ^[0-9]+$ ]] && echo "$size"
          }

          # Logs progress every 60s so a big file doesn't look stalled;
          # polls every 1s so a fast download isn't held to the next tick.
          download_with_progress() {
            local url="$1" output="$2" log="$3"
            local total_size; total_size=$(remote_size "$url")

            wget -nv "$url" -O "$output" 2> "$log" &
            local wget_pid=$! elapsed=0
            while kill -0 "$wget_pid" 2>/dev/null; do
              sleep 1
              elapsed=$((elapsed + 1))
              if [ $((elapsed % 60)) -eq 0 ] && kill -0 "$wget_pid" 2>/dev/null; then
                local now; now=$(stat -c%s "$output" 2>/dev/null || echo 0)
                if [ -n "$total_size" ] && [ "$total_size" -gt 0 ]; then
                  echo "$(basename "$url"): $(( now * 100 / total_size ))% ($(numfmt --to=iec "$now")/$(numfmt --to=iec "$total_size")) - ${elapsed}s elapsed"
                else
                  echo "$(basename "$url"): $(numfmt --to=iec "$now") downloaded - ${elapsed}s elapsed (server sent no size)"
                fi
              fi
            done
            wait "$wget_pid"
          }

          fetch_with_retry() {
            local url="$1" output="$2"
            local max_attempts=10 wait_seconds=15 attempt=1
            while true; do
              if download_with_progress "$url" "$output" wget_error.log; then
                return 0
              fi

              local http_code
              http_code=$(grep -oP 'ERROR \K[0-9]+(?=:)' wget_error.log | tail -n1) || true

              if [ -n "$http_code" ] && [ "$http_code" -ge 400 ] && [ "$http_code" -lt 500 ]; then
                # 4xx (usually 404) means the region path is wrong or gone
                # from Geofabrik - not transient, retrying would only hide it.
                echo "$url returned HTTP $http_code, not retrying. wget said:"
                cat wget_error.log
                return 1
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Giving up on $url after $attempt attempts."
                cat wget_error.log
                return 1
              fi

              if [ -n "$http_code" ]; then
                echo "Attempt $attempt/$max_attempts for $url got HTTP $http_code (server-side). Retrying in ${wait_seconds}s..."
              else
                echo "Attempt $attempt/$max_attempts for $url failed (network error). Retrying in ${wait_seconds}s..."
              fi
              sleep "$wait_seconds"
              attempt=$((attempt + 1))
              wait_seconds=$((wait_seconds * 2))
            done
          }

          # A completed HTTP download (wget exit 0) doesn't guarantee valid
          # zip content - Geofabrik can list a shp URL for a region whose
          # shapefile isn't actually valid server-side (seen with enfield:
          # HTTP 200, but "End-of-central-directory signature not found").
          # Verifying with `unzip -t` here means a bad download gets retried
          # a few times, instead of cascading into every later step.
          fetch_zip_with_verification() {
            local url="$1" output="$2"
            local max_attempts=3 attempt=1
            while true; do
              fetch_with_retry "$url" "$output" || return 1
              if unzip -tq "$output" >/dev/null 2>&1; then
                return 0
              fi
              echo "$url didn't produce a valid zip (attempt $attempt/$max_attempts) - retrying download..."
              rm -f "$output"
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "$url never produced a valid zip after $max_attempts attempts."
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 10
            done
          }

          # Forging order: heat the raw ore (download), skim the slag off
          # (drop glaciers/wetlands from the water layer), cast and hammer
          # the land into shape (clip to boundary, then erase the water out
          # of it), quench (compress, pack, and publish). Skimming happens
          # before casting so the water layer is already clean by the time
          # it's used to hammer the cast land into its final shape. Tiling
          # this region's own z8-14 shard used to happen here too (folded
          # into this same timed span so a region cheap to clip but slow to
          # tile still got flagged as slow for next run's queue ordering) -
          # it's now build-tiles-highzoom's job instead, so
          # combine-land-data/build-low-zoom-pmtiles don't have to wait on
          # tiling to finish before starting. update-timings adds that job's
          # per-region elapsed time back to this one's before recording it,
          # to keep the same "total cost including tiling" semantics.
          build_region_ndjson() {
            local REGION="$1"
            local START_TIME=$SECONDS

            echo "1/5 Heat — downloading $REGION's boundary and water layer..."
            fetch_with_retry "https://download.geofabrik.de/${REGION}.poly" region.poly || return 1
            fetch_zip_with_verification "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" region.shp.zip || return 1

            # Every step below is explicitly checked rather than relying on
            # `set -e`: this function is called as `if ! build_region_ndjson
            # ...`, and bash suppresses errexit for the whole duration of any
            # command tested by `if`/`!` - including everywhere inside a
            # called function. Without explicit checks, a failed
            # unzip/ogr2ogr/mapshaper here would silently cascade to
            # `return 0`, uploading a corrupt/empty archive as if the
            # region had succeeded (this happened with enfield before this fix).
            unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*" || {
              echo "$REGION's shp.zip didn't contain gis_osm_water_a_free_1.* - skipping."
              return 1
            }
            python3 poly2wkt.py || { echo "Failed to parse $REGION's boundary.poly."; return 1; }

            echo "2/5 Skim — dropping glaciers and wetlands from the water layer..."
            # gis_osm_water_a_free_1 lumps open water together with glaciers
            # (8211) and wetlands (8221); neither is open water, so leaving
            # them in would let the later erase step punch a false "sea"
            # hole through solid ice/marsh. Wetlands aren't a single fclass
            # value here — Geofabrik's schema doc (osm-data-in-gis-formats-
            # free.pdf, version 13, 2026-04-02: "Split 8221 (wetland) into
            # individual feature classes for different types of wetlands")
            # splits them into subtypes (wetland, wetland_mangrove,
            # wetland_tidalflat, wetland_marsh, wetland_bog, wetland_fen,
            # wetland_saltmarsh, wetland_swamp, wetland_wet_meadow, ...),
            # confirmed against real extracts (Guinea-Bissau, Greenland).
            # An exact `= 'wetland'` match left every subtype in
            # water_filtered.shp, so mangroves/tidal flats/marshes were
            # still being erased from land as if they were
            # open water; matching the `wetland%` prefix instead of exact
            # equality catches all of them. glacier has no such subtypes.
            # -lco ENCODING=UTF-8 writes the DBF as UTF-8 so non-Latin-1
            # names skip the lossy-conversion warning.
            ogr2ogr -f "ESRI Shapefile" -lco ENCODING=UTF-8 water_filtered.shp \
              gis_osm_water_a_free_1.shp -where "fclass != 'glacier' AND fclass NOT LIKE 'wetland%'" || {
              echo "Water filter step failed for $REGION."; return 1;
            }

            echo "3/5 Cast — clipping the global land polygons to $REGION's boundary..."
            # Filters the global land polygons on disk (keeps RAM usage
            # down); boundary.wkt is the mould it clips against.
            ogr2ogr -f "ESRI Shapefile" local_land.shp \
              land_data/land-polygons-split-4326/land_polygons.shp \
              -clipsrc "$(cat boundary.wkt)" -makevalid || {
              echo "Clip step failed for $REGION."; return 1;
            }

            echo "4/5 Hammer — erasing the water out of the cast land (Mapshaper)..."
            # `format=geojson ndjson` is required: without it mapshaper
            # writes a multi-line FeatureCollection despite the .ndjson
            # name, and combine-land-data concatenates every region into one
            # stream that's only valid if each line is a standalone feature.
            # Concatenated FeatureCollections break Tippecanoe's streaming
            # parser ("Found ] at top level" / unclosed containers).
            mapshaper local_land.shp -erase water_filtered.shp -o land_layer.ndjson format=geojson ndjson || {
              echo "Mapshaper erase step failed for $REGION."; return 1;
            }

            local REGION_SLUG; REGION_SLUG=$(echo "${REGION}" | tr '/' '-')

            # Gzip-compressed for two consumers: combine-land-data (which
            # concatenates every region's copy into one global stream for
            # the low-zoom z0-7 pass) and build-tiles-highzoom (which
            # decompresses this exact file to tile this region's own z8-14
            # shard). Published as its own per-region artifact rather than
            # bundled with other regions into one per-worker artifact, so
            # build-tiles-highzoom's workers can each claim-and-fetch
            # exactly the regions they're assigned instead of every worker
            # bulk-downloading every region's data.
            local FILENAME; FILENAME="${REGION_SLUG}.ndjson.gz"
            echo "5/5 Quench — compressing, packing, and publishing the raw geometry..."
            gzip -c land_layer.ndjson > "$FILENAME" && gzip -t "$FILENAME" 2>/dev/null || {
              echo "Packing $REGION produced a corrupt/empty archive - discarding it."
              rm -f "$FILENAME"
              return 1
            }

            node -e "
              const { DefaultArtifactClient } = require('@actions/artifact');
              (async () => {
                const client = new DefaultArtifactClient();
                await client.uploadArtifact('ndjson-${REGION_SLUG}', ['${FILENAME}'], '.', { retentionDays: 1 });
              })().catch((err) => { console.error(err); process.exit(1); });
            " || {
              echo "Publishing $REGION's ndjson artifact failed."
              rm -f "$FILENAME"
              return 1
            }

            local ELAPSED_TIME=$(( SECONDS - START_TIME ))
            echo "Finished $REGION in ${ELAPSED_TIME}s."
            echo "| \`$REGION\` | $ELAPSED_TIME | done |" >> $GITHUB_STEP_SUMMARY

            # Record the duration for prepare to fold into next month's average.
            jq --arg region "$REGION" --argjson t "$ELAPSED_TIME" \
              '. + {($region): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
              && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"
            return 0
          }

          while true; do
            REGION=$(claim_region) || break

            echo "Claimed $REGION"

            if ! build_region_ndjson "$REGION"; then
              echo "::error::$REGION failed - discarding it, moving on to the next region."
              echo "| \`$REGION\` | — | failed |" >> $GITHUB_STEP_SUMMARY
              FAILED_REGIONS+=("$REGION")
            fi

            # Clear the workbench so the loop doesn't fill up the disk.
            rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* water_filtered.* boundary.wkt land_layer.ndjson local_land.* wget_error.log
          done

          if [ ${#FAILED_REGIONS[@]} -gt 0 ]; then
            echo "${#FAILED_REGIONS[@]} region(s) failed: ${FAILED_REGIONS[*]}"
            echo "Everything that DID finish is still uploaded below; this non-zero"
            echo "exit only makes the failure visible in the Actions UI."
            exit 1
          fi

      - name: Upload Worker Timings
        # Each region's own ndjson.gz is already published individually
        # (see the per-region "node -e" upload in build_region_ndjson
        # above) - this is just the small per-worker timing summary, still
        # cheap to bundle. "warn" because a worker whose very first claim
        # already failed permanently may legitimately produce zero files.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: region-timings-ndjson-worker-${{ matrix.worker }}
          path: "timings-ndjson-worker-*.json"
          retention-days: 1
          if-no-files-found: warn

  cleanup-region-queue:
    # region-queue only coordinates live claims while build-tiles-ndjson
    # runs; once every worker has emptied or given up on it, nothing reads
    # it again and its commit history (one commit per claim) is pure churn,
    # so the branch is deleted rather than left around. `prepare` recreates
    # it fresh next run.
    if: ${{ !cancelled() }}
    needs: [build-tiles-ndjson]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete Region Queue Branch
        run: |
          if git ls-remote --exit-code --heads origin "$QUEUE_BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$QUEUE_BRANCH"
          else
            echo "$QUEUE_BRANCH branch is already gone - nothing to clean up."
          fi

  prepare-tiling-queue:
    # Seeds build-tiles-highzoom's own queue, the same way `prepare` seeds
    # build-tiles-ndjson's - except from this run's own phase-1 results
    # rather than Geofabrik's index: this job only needs to know which
    # regions actually finished phase 1 (those are exactly the ones with a
    # published ndjson artifact to tile), and this run's own
    # build_region_ndjson elapsed times are a fresher signal for sorting
    # than last month's region_timings.json history.
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [build-tiles-ndjson]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Per-Worker NDJSON-Phase Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every worker failed before finishing a single region
        with:
          pattern: region-timings-ndjson-worker-*
          path: download_ndjson_timings
          merge-multiple: true

      - name: Sort Regions by NDJSON-Phase Time and Publish the Tiling Queue
        run: |
          python3 << 'PYEOF'
          import glob, json

          # The union of every worker's timed regions is exactly the set
          # that finished phase 1 successfully - a region that failed there
          # never got a timing entry, and never published an ndjson artifact
          # for build-tiles-highzoom to fetch either.
          elapsed = {}
          for path in sorted(glob.glob("download_ndjson_timings/timings-ndjson-worker-*.json")):
              with open(path) as f:
                  elapsed.update(json.load(f))

          # Sorted largest-first, same largest-estimate-first philosophy as
          # `prepare`'s region-queue. Ndjson-build time stands in for
          # tiling-time here since it's this run's freshest available
          # signal - no tiling-time history exists yet to sort by until
          # update-timings records this run's own tiling times afterward.
          sorted_regions = [r for r, _ in sorted(elapsed.items(), key=lambda kv: kv[1], reverse=True)]

          print(f"Queued {len(sorted_regions)} region(s) for tiling:")
          for r in sorted_regions:
              print(f"  {r}: ~{elapsed[r]:.0f}s ndjson-build time")

          with open("queue.json", "w") as f:
              json.dump(sorted_regions, f)
          PYEOF

      - name: Publish Tiling Queue for This Run
        # Always resets region-tiling-queue from scratch, same as
        # `prepare`'s region-queue - safe unconditionally under the
        # top-level `concurrency` group.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$TILING_QUEUE_BRANCH"
          git rm -rf . > /dev/null 2>&1 || true
          git add queue.json
          git commit -m "chore: seed tiling queue ($(jq 'length' queue.json) region(s))"
          git push --force origin "$TILING_QUEUE_BRANCH"

  build-tiles-highzoom:
    # Phase 2 of 2 (see build-tiles-ndjson above): claims regions from its
    # own region-tiling-queue and tiles each one's z8-14 shard. A second,
    # independent dynamic queue - rather than reusing build-tiles-ndjson's
    # worker assignment 1:1 - because tiling cost doesn't track ndjson-build
    # cost well (see the TILING_QUEUE_BRANCH comment at the top of this
    # file), so a fixed per-worker split here could leave some workers idle
    # while others work through a slow-to-tile backlog they can't shed.
    # Skip entirely if a debug run ID is provided, same as build-tiles-ndjson.
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools, prepare-tiling-queue]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.prepare.outputs.worker_ids) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Install Per-Region Artifact Downloader
        # Symmetric with build-tiles-ndjson's per-region uploader: fetching
        # a specific region's ndjson artifact by a name only known at
        # runtime (whatever this worker just claimed) can't be expressed as
        # a static actions/download-artifact step, so it's done via the same
        # @actions/artifact SDK directly instead.
        run: npm install --no-save @actions/artifact@^2

      - name: Configure Git Identity for Queue Claims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tile the Land Until the Shared Tiling Queue Is Empty
        run: |
          echo "### Tiling Log — Worker ${{ matrix.worker }}" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (s) | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          TIMINGS_FILE="timings-highzoom-worker-${{ matrix.worker }}.json"
          echo '{}' > "$TIMINGS_FILE"
          FAILED_REGIONS=()

          # Same optimistic commit-and-push claim pattern as
          # build-tiles-ndjson's claim_region, against the tiling queue
          # instead of the region queue.
          claim_region() {
            for attempt in $(seq 1 10); do
              git fetch origin "$TILING_QUEUE_BRANCH" -q
              git checkout -q -B "$TILING_QUEUE_BRANCH" "origin/$TILING_QUEUE_BRANCH"

              local queue_len region
              queue_len=$(jq 'length' queue.json)
              if [ "$queue_len" -eq 0 ]; then
                return 1
              fi

              region=$(jq -r '.[0]' queue.json)
              jq '.[1:]' queue.json > queue.json.next && mv queue.json.next queue.json

              git add queue.json
              git commit -q -m "chore: claim $region"

              if git push origin "$TILING_QUEUE_BRANCH" -q 2>/dev/null; then
                echo "$region"
                return 0
              fi
              echo "Lost the claim race on attempt $attempt, retrying..." >&2
              sleep $(( (RANDOM % 4) + 1 ))
            done
            return 1
          }

          tile_region() {
            local REGION="$1"
            local START_TIME=$SECONDS
            local REGION_SLUG; REGION_SLUG=$(echo "${REGION}" | tr '/' '-')
            local FILENAME="${REGION_SLUG}.ndjson.gz"

            echo "1/2 Fetch — downloading $REGION's ndjson artifact..."
            # Mirrors build-tiles-ndjson's per-region upload: this worker
            # fetches exactly the one region it just claimed, on demand,
            # rather than every worker bulk-downloading every region's data
            # up front.
            node -e "
              const { DefaultArtifactClient } = require('@actions/artifact');
              (async () => {
                const client = new DefaultArtifactClient();
                const { artifact } = await client.getArtifact('ndjson-${REGION_SLUG}');
                await client.downloadArtifact(artifact.id, { path: '.' });
              })().catch((err) => { console.error(err); process.exit(1); });
            " || { echo "Couldn't fetch $REGION's ndjson artifact."; return 1; }

            gunzip -c "$FILENAME" > land_layer.ndjson || {
              echo "Couldn't decompress $REGION's ndjson artifact."; return 1;
            }

            echo "2/2 Temper — tiling $REGION's high-zoom (z8-14) shard..."
            # Safe to do per-region (rather than needing a global view like
            # build-low-zoom-pmtiles' z0-7 pass): at z8+ a tile essentially
            # never spans more than one region's own coastline, so there's
            # no cross-region density decision that could come out
            # inconsistent between regions. -pS exempts the deepest zoom
            # (14) from --simplification=10, same as the original
            # single-build design this replaced.
            tippecanoe -P -U 60 --force \
              -o "${REGION_SLUG}-highzoom.pmtiles" \
              -l land -Z 8 -z 14 -pS --simplification=10 --drop-smallest-as-needed \
              land_layer.ndjson || {
              echo "Tiling step failed for $REGION."; return 1;
            }

            local ELAPSED_TIME=$(( SECONDS - START_TIME ))
            echo "Finished $REGION in ${ELAPSED_TIME}s."
            echo "| \`$REGION\` | $ELAPSED_TIME | done |" >> $GITHUB_STEP_SUMMARY

            # Record this phase's duration - update-timings sums it with
            # this region's ndjson-phase time before folding into next
            # month's average.
            jq --arg region "$REGION" --argjson t "$ELAPSED_TIME" \
              '. + {($region): $t}' "$TIMINGS_FILE" > "${TIMINGS_FILE}.tmp" \
              && mv "${TIMINGS_FILE}.tmp" "$TIMINGS_FILE"
            return 0
          }

          while true; do
            REGION=$(claim_region) || break

            echo "Claimed $REGION"

            if ! tile_region "$REGION"; then
              echo "::error::$REGION failed - discarding it, moving on to the next region."
              echo "| \`$REGION\` | — | failed |" >> $GITHUB_STEP_SUMMARY
              FAILED_REGIONS+=("$REGION")
            fi

            # Clear the workbench so the loop doesn't fill up the disk.
            REGION_SLUG=$(echo "${REGION}" | tr '/' '-')
            rm -f "${REGION_SLUG}.ndjson.gz" land_layer.ndjson
          done

          if [ ${#FAILED_REGIONS[@]} -gt 0 ]; then
            echo "${#FAILED_REGIONS[@]} region(s) failed: ${FAILED_REGIONS[*]}"
            echo "Everything that DID finish is still uploaded below; this non-zero"
            echo "exit only makes the failure visible in the Actions UI."
            exit 1
          fi

      - name: Upload Worker High-Zoom PMTiles Shards
        # One .pmtiles file per region this worker successfully tiled,
        # bundled into one artifact per worker. Output doesn't need
        # per-region granularity like the ndjson input does - build-pmtiles
        # just globs every worker's shards together with no rebalancing step
        # downstream. "warn" because a worker whose very first claim already
        # failed permanently may legitimately produce zero files.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highzoom-worker-${{ matrix.worker }}
          path: "*-highzoom.pmtiles"
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Worker Timings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: region-timings-highzoom-worker-${{ matrix.worker }}
          path: "timings-highzoom-worker-*.json"
          retention-days: 1
          if-no-files-found: warn

  cleanup-tiling-queue:
    # region-tiling-queue only coordinates live claims while
    # build-tiles-highzoom runs - same reasoning as cleanup-region-queue,
    # just for the second queue.
    if: ${{ !cancelled() }}
    needs: [build-tiles-highzoom]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete Tiling Queue Branch
        run: |
          if git ls-remote --exit-code --heads origin "$TILING_QUEUE_BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$TILING_QUEUE_BRANCH"
          else
            echo "$TILING_QUEUE_BRANCH branch is already gone - nothing to clean up."
          fi

  update-timings:
    # Runs whenever build-tiles-ndjson executed and wasn't cancelled,
    # deliberately not gated on it (or build-tiles-highzoom) fully
    # succeeding: with per-region failure isolation, some regions can fail
    # while others finish fine, and those timings are still worth keeping.
    # A debug run skips both build-tiles-* jobs entirely, which the merge
    # step below already handles gracefully.
    if: ${{ !cancelled() }}
    needs: [build-tiles-ndjson, build-tiles-highzoom]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Per-Worker NDJSON-Phase Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every worker failed before finishing a single region, or a debug run skipped build-tiles-ndjson
        with:
          pattern: region-timings-ndjson-worker-*
          path: download_ndjson_timings
          merge-multiple: true

      - name: Download Per-Worker Tiling-Phase Timings
        uses: actions/download-artifact@v4
        continue-on-error: true # no artifacts if every worker failed before finishing a single region, or a debug run skipped build-tiles-highzoom
        with:
          pattern: region-timings-highzoom-worker-*
          path: download_highzoom_timings
          merge-multiple: true

      - name: Switch to Dedicated Timings Branch
        # Keeps the timings file's auto-commits off main entirely: check out
        # the branch as-is if it exists, otherwise create it as an orphan.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
            echo "Branch $TIMINGS_BRANCH exists - checking it out."
            git fetch origin "$TIMINGS_BRANCH"
            git checkout -B "$TIMINGS_BRANCH" "origin/$TIMINGS_BRANCH"
          else
            echo "Branch $TIMINGS_BRANCH doesn't exist yet - creating an orphan branch."
            git checkout --orphan "$TIMINGS_BRANCH"
            git rm -rf . > /dev/null
          fi

      - name: Merge Region Timings
        env:
          # How many recent measurements to keep per region - prepare
          # averages over this history so one bad-connection run fades out
          # instead of permanently skewing the estimate.
          TIMING_HISTORY_LENGTH: "5"
        run: |
          if [ ! -f region_timings.json ]; then echo '{}' > region_timings.json; fi

          python3 << 'PYEOF'
          import json, glob, os

          HISTORY_LENGTH = int(os.environ["TIMING_HISTORY_LENGTH"])

          with open("region_timings.json") as f:
              timings = json.load(f)

          # Merge this run's two phases into one per-region total before
          # folding into history, so a recorded duration still reflects the
          # full cost of a region (ndjson-build + tiling) - the same thing
          # a single process_region span used to capture directly, back
          # when both phases ran together. That's what keeps next run's
          # largest-estimate-first queue ordering meaningful. A region
          # present in only one phase's timings (e.g. it finished
          # ndjson-build but failed tiling) still contributes whatever
          # partial time is available rather than being dropped.
          def load_merged(pattern):
              merged = {}
              for path in sorted(glob.glob(pattern)):
                  with open(path) as f:
                      merged.update(json.load(f))
              return merged

          ndjson_elapsed = load_merged("download_ndjson_timings/timings-ndjson-worker-*.json")
          highzoom_elapsed = load_merged("download_highzoom_timings/timings-highzoom-worker-*.json")

          if not ndjson_elapsed and not highzoom_elapsed:
              print("No region timing artifacts found - nothing to merge this run.")
          else:
              all_regions = set(ndjson_elapsed) | set(highzoom_elapsed)
              for region in all_regions:
                  seconds = ndjson_elapsed.get(region, 0) + highzoom_elapsed.get(region, 0)
                  history = timings.get(region, [])
                  # Migrate older snapshots that held a single number per region.
                  if not isinstance(history, list):
                      history = [history]
                  history.append(seconds)
                  timings[region] = history[-HISTORY_LENGTH:]

          with open("region_timings.json", "w") as f:
              json.dump(timings, f)

          print(f"region_timings.json now tracks {len(timings)} region(s).")
          PYEOF

      - name: Commit Updated Timings
        run: |
          git add region_timings.json

          if git diff --cached --quiet; then
            echo "No timing changes to commit."
            exit 0
          fi

          git commit -m "chore: update region processing timings"

          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads origin "$TIMINGS_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$TIMINGS_BRANCH"
              if ! git rebase "origin/$TIMINGS_BRANCH"; then
                git rebase --abort
                echo "Rebase conflict on attempt $attempt, retrying in 5s..."
                sleep 5
                continue
              fi
            fi
            if git push origin "HEAD:$TIMINGS_BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "Could not push updated timings after 5 attempts."
          exit 1

  combine-land-data:
    # Does the decompress+concatenate work exactly once, as its own job
    # (rather than inlined into build-low-zoom-pmtiles) so a DEBUG run can
    # pull already-processed geometry from an older run without re-running
    # build-tiles-ndjson. Only feeds the global low-zoom (z0-7) shard now -
    # the z8-14 shards are built directly from each region's own ndjson in
    # build-tiles-highzoom, without ever passing through this combined
    # stream. Needs only build-tiles-ndjson (not build-tiles-highzoom too) -
    # that's the whole point of the two-phase split, so this job and the
    # low-zoom pass it feeds can run concurrently with tiling instead of
    # waiting for it. Not gated on build-tiles-ndjson fully succeeding (only
    # on not cancelled): every region that DID finish still made it into an
    # artifact, and the low-zoom shard should still build from those.
    # Skipped when debug_resume_at is "pmtile-generation", since
    # world-low-pmtiles was already built in debug_run_id's run.
    if: ${{ !cancelled() && !(github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation') }}
    needs: [build-tiles-ndjson]
    runs-on: ubuntu-latest
    steps:
      - name: Download Land Geometry (Standard Workflow Execution)
        # Each region published its own ndjson artifact individually (see
        # build-tiles-ndjson) rather than one bundle per worker; the `ndjson-*`
        # pattern below still collects all of them in one merge-multiple call.
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: ndjson-*
          path: download_ndjson
          merge-multiple: true

      - name: Download Land Geometry (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: ndjson-*
          path: download_ndjson
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Concatenate All Regions into One Global Stream
        run: |
          shopt -s nullglob
          files=(download_ndjson/*.ndjson.gz)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No land-ndjson artifacts were downloaded - nothing to combine."
            exit 1
          fi

          : > world_land.ndjson
          BAD_FILES=()

          for f in "${files[@]}"; do
            # A worker can be killed mid-write and its `if: always()` upload
            # still publish a truncated .gz. Integrity-check each file so
            # one bad archive can't take down the whole merge - process_region
            # already verifies its own output, so this is mainly a backstop
            # for a hard runner kill mid-write.
            if gzip -t "$f" 2>/dev/null; then
              zcat "$f" >> world_land.ndjson
            else
              echo "::warning::$f failed gzip integrity check (truncated/corrupt) - skipping it."
              BAD_FILES+=("$f")
            fi
          done

          echo "Combined size:"
          du -h world_land.ndjson

          if [ ${#BAD_FILES[@]} -gt 0 ]; then
            echo "::error::${#BAD_FILES[@]} region archive(s) were corrupt and excluded: ${BAD_FILES[*]}"
            echo "world.pmtiles will be missing land data for those region(s) this run."
            exit 1
          fi

      - name: Upload Combined Land Data
        if: always() # A partial world_land.ndjson (bad region(s) skipped above) should still flow to build-low-zoom-pmtiles rather than losing the whole month's run.
        uses: actions/upload-artifact@v4
        with:
          name: world-land-ndjson
          path: world_land.ndjson
          retention-days: 1

  build-low-zoom-pmtiles:
    # Builds the z0-7 tileset globally, in one pass, over the full combined
    # land geometry. This range needs a single global view because at low
    # zoom many regions collapse into the same handful of shared tiles (at
    # z0 every region on Earth maps to the same tile, 0/0/0) - simplification
    # and --drop-smallest-as-needed decisions have to be made with the whole
    # picture in view, or two regions sharing a tile could end up
    # inconsistently simplified. It's still fast as a single global pass
    # because z0-7 has orders of magnitude fewer tiles than the full z0-14
    # range (see build-tiles-highzoom for why z8-14 is instead parallelized
    # per-worker - and note this job now runs concurrently with that one,
    # not after it, since combine-land-data only depends on build-tiles-ndjson).
    #
    # Skipped when debug_resume_at is "pmtile-generation", since
    # world-low-pmtiles was already built in debug_run_id's run - build-pmtiles
    # pulls it from there directly instead.
    if: ${{ !cancelled() && !(github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation') }}
    needs: [combine-land-data, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Combined Land Data
        # combine-land-data always ran earlier in THIS run whenever this job
        # runs (see the "if" above) - no debug-mode branch needed here, only
        # in build-pmtiles below (which this shard still has to reach through).
        uses: actions/download-artifact@v4
        with:
          name: world-land-ndjson

      - name: Build Low-Zoom (z0-7) PMTiles Shard
        run: |
          # -P reads/writes in parallel; -U 60 logs progress every 60s.
          #
          # No -pS here: unlike the per-worker z8-14 shards (where z14 is
          # deliberately left unsimplified, see build-tiles-highzoom), every
          # zoom in this z0-7 range counts as "low zoom" for the original
          # oversized-tile fix, so --simplification=10 applies uniformly
          # across all of it, including the top zoom (7) - it hands off
          # cleanly to the per-worker shards' z8 tiles just below it.
          #
          # --drop-smallest-as-needed guards the case that actually caused
          # this whole split: dense archipelago/fjord regions blowing past
          # the 500KB tile-size cap as early as zoom 3-6.
          tippecanoe -P -U 60 --force \
            -o world_low.pmtiles \
            -l land -Z 0 -z 7 --simplification=10 --drop-smallest-as-needed \
            world_land.ndjson

          echo "Low-zoom PMTiles shard size:"
          du -h world_low.pmtiles

      - name: Upload Low-Zoom PMTiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-low-pmtiles
          path: world_low.pmtiles
          retention-days: 1

  build-pmtiles:
    # Assembles the final global archive by tile-join-ing the low-zoom (z0-7)
    # shard from build-low-zoom-pmtiles with every worker's high-zoom (z8-14)
    # shard from build-tiles-highzoom - replacing what used to be one single
    # tippecanoe run over all 15 zoom levels, which was hitting GitHub's hard
    # 6h per-job limit on hosted runners before it even finished. Splitting
    # by zoom range keeps the same correctness guarantees the old single-build
    # design had (the low-zoom range - the only one where regions genuinely
    # overlap in the same tiles - is still decided globally, in one pass, by
    # build-low-zoom-pmtiles) while parallelizing the z8-14 range across every
    # build-tiles-highzoom worker, since tiles that deep essentially never
    # span more than one region's own coastline. build-tiles-highzoom and
    # build-low-zoom-pmtiles run concurrently (see build-tiles-ndjson/
    # combine-land-data), so this job just waits on whichever finishes last.
    #
    # `!cancelled()` lets this job still run when its needs were themselves
    # skipped, as on a DEBUG run with debug_resume_at: pmtile-generation.
    if: ${{ !cancelled() }}
    needs: [build-tiles-highzoom, build-low-zoom-pmtiles, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install Tippecanoe
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Download Low-Zoom Shard (Standard Workflow Execution, or DEBUG Resuming at Regions-Merge)
        # Covers a normal run and a DEBUG run resuming at "regions-merge" -
        # in both cases build-low-zoom-pmtiles ran earlier in THIS run.
        if: ${{ !(github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation') }}
        uses: actions/download-artifact@v4
        with:
          name: world-low-pmtiles
          path: shards

      - name: Download Low-Zoom Shard (DEBUG Mode - Resuming at PMTiles Generation)
        # build-low-zoom-pmtiles was skipped this run, so pull the
        # already-built shard straight from debug_run_id's own run.
        if: ${{ github.event.inputs.debug_run_id != '' && github.event.inputs.debug_resume_at == 'pmtile-generation' }}
        uses: actions/download-artifact@v4
        with:
          name: world-low-pmtiles
          path: shards
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Download High-Zoom Shards (Standard Workflow Execution, or Any DEBUG Resume)
        # build-tiles-highzoom is skipped whenever debug_run_id is set at all
        # (regardless of debug_resume_at), so its worker shards only exist as
        # same-run artifacts on a standard run - a debug run always needs
        # them from debug_run_id instead.
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: highzoom-worker-*
          path: shards
          merge-multiple: true

      - name: Download High-Zoom Shards (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: highzoom-worker-*
          path: shards
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      - name: Join Shards into the Final Global PMTiles Archive
        run: |
          shopt -s nullglob
          shard_files=(shards/*.pmtiles)

          if [ ${#shard_files[@]} -eq 0 ]; then
            echo "No PMTiles shards were downloaded - nothing to join."
            exit 1
          fi

          # -pk (--no-tile-size-limit) matters only here, not in the shard
          # builds above: each shard already enforces the 500KB cap itself
          # via --drop-smallest-as-needed, shrinking oversized tiles down
          # before they're written. But tile-join's own default behavior for
          # a tile that's STILL oversized after being merged from multiple
          # shards (e.g. two neighboring regions' high-zoom shards sharing a
          # border tile) is to skip it outright - silently punching a hole in
          # the map at that tile, which is worse than letting a rare merged
          # tile stay a bit large. -pk keeps that from happening.
          #
          # No --no-tile-compression, matching the old single-build command:
          # PMTiles stores gzip-compressed tiles per spec, and
          # pmtiles.js/MapLibre GL decompress on the fly.
          tile-join --force -pk \
            -o world.pmtiles \
            -l land \
            "${shard_files[@]}"

          echo "PMTiles archive size:"
          du -h world.pmtiles

      - name: Upload PMTiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-pmtiles
          path: world.pmtiles
          retention-days: 1

  publish-release:
    # Publishes the PMTiles archive on a single, rolling GitHub Release
    # instead of gh-pages - Release assets are served from a CDN that
    # honours HTTP Range requests, which pmtiles.js/MapLibre GL need to
    # stream chunks on demand.
    if: ${{ !cancelled() }}
    needs: [build-pmtiles]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: land-tiles-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download PMTiles Artifact
        uses: actions/download-artifact@v4
        with:
          name: world-pmtiles
          path: .

      - name: Create Release (If It Doesn't Exist Yet)
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Global Land Tiles (PMTiles)" \
              --notes "Automatically generated global land PMTiles archive, rebuilt monthly. The asset below is overwritten in place on every run - use the /releases/latest/download/ URL to always fetch the newest build." \
              --latest
          fi

      - name: Upload PMTiles Asset (Overwrite Existing)
        run: |
          gh release upload "$RELEASE_TAG" world.pmtiles --clobber
