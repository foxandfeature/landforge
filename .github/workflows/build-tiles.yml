name: Build and Deploy Land Tiles

on:
  schedule:
    - cron: "0 0 1 * *" # Runs automatically on the 1st of every month
  workflow_dispatch:
    inputs:
      region:
        description: "Manual selection: Specific region or ALL_REGIONS"
        required: true
        default: "europe/germany/niedersachsen"
        type: choice
        options:
          - "ALL_REGIONS"
          - "europe/germany/niedersachsen"
      debug_run_id:
        description: "DEBUG: Run ID to download existing artifacts (skips tile generation)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.regions.outputs.batches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load and Chunk Region Lists
        id: regions
        run: |
          # Split automated schedules or global builds into optimized processing chunks
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.region }}" = "ALL_REGIONS" ]; then
            STANDARD=$(jq -c '[_nwise(20)]' regions.json)
            LARGE=$(jq -c '[.[] | [.] ]' large_regions.json)
            COMBINED=$(jq -c -n --argjson std "$STANDARD" --argjson lrg "$LARGE" '$lrg + $std')
            echo "batches=$COMBINED" >> "$GITHUB_OUTPUT"
          else
            echo "batches=[[\"${{ github.event.inputs.region }}\"]]" >> "$GITHUB_OUTPUT"
          fi

  setup-tools:
    runs-on: ubuntu-latest
    outputs:
      tippecanoe-key: ${{ steps.tc-version.outputs.key }}
    steps:
      - name: Determine Tippecanoe Cache Key
        id: tc-version
        run: |
          # Generate a deterministic cache key using Tippecanoe's latest commit hash
          HASH=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)
          echo "key=tippecanoe-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache Tippecanoe Binaries
        id: cache-tippecanoe
        uses: actions/cache@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ steps.tc-version.outputs.key }}

      - name: Build Tippecanoe (Only on Cache Miss)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc)
          mkdir -p ../tippecanoe-bin
          cp tippecanoe tile-join ../tippecanoe-bin/

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Global Land Data
        id: cache-land
        uses: actions/cache@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}

      - name: Download Global Land Data (Only on Cache Miss)
        if: steps.cache-land.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss! Downloading OSM land polygons from web..."
          attempt=1
          max_attempts=5
          wait_seconds=15
          until wget -nv "https://osmdata.openstreetmap.de/download/land-polygons-split-4326.zip" -O land.zip; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "❌ Failed to download land data after $attempt attempts."
              exit 1
            fi
            echo "⚠️  Attempt $attempt/$max_attempts failed. Retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
            wait_seconds=$((wait_seconds * 2))
          done
          unzip -q -o land.zip -d land_data
          rm land.zip

  build-tiles:
    # Skip this heavy job entirely if a debug run ID is provided
    if: ${{ github.event.inputs.debug_run_id == '' }}
    needs: [prepare, setup-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.prepare.outputs.batches) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install GDAL, Mapshaper & Link Tippecanoe
        run: |
          sudo apt-get update && sudo apt-get install -y gdal-bin libsqlite3-0 zlib1g nodejs npm
          sudo npm install -g mapshaper
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      - name: Get Current Month for Cache Key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore Global Land Data from Cache
        uses: actions/cache/restore@v4
        with:
          path: land_data
          key: ${{ runner.os }}-land-data-${{ steps.date.outputs.month }}
          fail-on-cache-miss: true

      - name: Create Python Helper Script
        run: |
          cat << 'EOF' > poly2wkt.py
          import sys
          polygons = []
          current = []
          # Read and parse Geofabrik .poly format lines into coordinates
          with open('region.poly') as f:
              for line in f.readlines()[1:]:
                  line = line.strip()
                  if not line or line == 'END':
                      if current:
                          # Close the polygon loop if required
                          if current[0] != current[-1]: current.append(current[0])
                          polygons.append(f"(({','.join(current)}))")
                          current = []
                      continue
                  p = line.split()
                  if len(p) == 2: current.append(f"{p[0]} {p[1]}")
          # Format structures cleanly into a single valid WKT geometry string
          wkt = f"MULTIPOLYGON({','.join(polygons)})" if len(polygons) > 1 else f"POLYGON{polygons[0]}"
          with open('boundary.wkt', 'w') as out: out.write(wkt)
          EOF

      - name: Process Region Data (Loop through Batch)
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          REGIONS=$(echo '${{ toJSON(matrix.batch) }}' | jq -r '.[]')

          echo "### Region Processing Metrics (Batch ${{ strategy.job-index }})" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Time (Seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------|" >> $GITHUB_STEP_SUMMARY

          fetch_with_retry() {
            local url="$1"
            local output="$2"
            local max_attempts=10
            local wait_seconds=15
            local attempt=1

            until wget -nv "$url" -O "$output"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "❌ Giving up on $url after $attempt attempts."
                return 1
              fi
              echo "⚠️  Attempt $attempt/$max_attempts for $url failed. Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
              attempt=$((attempt + 1))
              wait_seconds=$((wait_seconds * 2))
            done
          }

          for REGION in $REGIONS; do
              echo "========================================"
              echo "Processing Region: $REGION"
              echo "========================================"
              
              START_TIME=$SECONDS
              
              fetch_with_retry "https://download.geofabrik.de/${REGION}.poly" region.poly || exit 1
              fetch_with_retry "https://download.geofabrik.de/${REGION}-latest-free.shp.zip" region.shp.zip || exit 1
              
              unzip -q -o region.shp.zip "gis_osm_water_a_free_1.*"
              python3 poly2wkt.py

              echo "1. Clipping global land polygons to the boundary..."
              # ogr2ogr filters global land polygons on disk to keep RAM usage low
              ogr2ogr -f "ESRI Shapefile" local_land.shp \
                land_data/land-polygons-split-4326/land_polygons.shp \
                -clipsrc "$(cat boundary.wkt)" \
                -makevalid

              echo "2. Punching inland water out of the clipped land (via Mapshaper)..."
              mapshaper local_land.shp -erase gis_osm_water_a_free_1.shp -o land_layer.ndjson

              FILENAME=$(echo "${REGION}" | tr '/' '-').mbtiles
              echo "3. Building vector tiles with parallel execution..."
              tippecanoe -P -U 60 -o "$FILENAME" -l land -z 14 -Z 0 --drop-densest-as-needed land_layer.ndjson
              
              ELAPSED_TIME=$(( SECONDS - START_TIME ))
              echo "✅ Completed $REGION in $ELAPSED_TIME seconds."
              
              echo "| \`$REGION\` | $ELAPSED_TIME |" >> $GITHUB_STEP_SUMMARY
              
              # Clear temporary space to prevent running out of disk storage across batch loops
              rm -f region.poly region.shp.zip gis_osm_water_a_free_1.* boundary.wkt land_layer.ndjson local_land.*
          done

      - name: Upload Batch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbtiles-batch-${{ strategy.job-index }}
          path: "*.mbtiles"
          retention-days: 1

  deploy-tiles:
    # Ensure this runs even if the build-tiles job was conditionally skipped
    if: ${{ !failure() && !cancelled() }}
    needs: [build-tiles, setup-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Tippecanoe Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: tippecanoe-bin
          key: ${{ runner.os }}-${{ needs.setup-tools.outputs.tippecanoe-key }}
          fail-on-cache-miss: true

      - name: Install PMTiles CLI
        run: |
          sudo cp tippecanoe-bin/tippecanoe tippecanoe-bin/tile-join /usr/local/bin/
          sudo chmod +x /usr/local/bin/tippecanoe /usr/local/bin/tile-join

      # --- ARTIFACT DOWNLOAD CONFIGURATION (TARGETING RAM DISK) ---

      - name: Download MBTiles (Standard Workflow Execution)
        if: ${{ github.event.inputs.debug_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: mbtiles-batch-*
          path: /dev/shm/download_mbtiles
          merge-multiple: true

      - name: Download MBTiles (DEBUG Mode - Targets Older Workflow Run)
        if: ${{ github.event.inputs.debug_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: mbtiles-batch-*
          path: /dev/shm/download_mbtiles
          merge-multiple: true
          run-id: ${{ github.event.inputs.debug_run_id }}
          github-token: ${{ github.token }}

      # --- PROCESSING & DEPLOYMENT ---

      - name: Merge and Convert to PMTiles
        run: |
          mkdir -p /dev/shm/deploy_folder
          
          # -pk bypasses tile size verification for maximum speed
          tile-join -pk -o /dev/shm/deploy_folder/land.pmtiles /dev/shm/download_mbtiles/*.mbtiles
          
          # Move the final output back to your workspace for the deployment action
          mkdir -p deploy_folder
          mv /dev/shm/deploy_folder/land.pmtiles deploy_folder/

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          target-folder: tiles/land
          branch: gh-pages
          clean: true
          commit-message: "Deploy Consolidated PMTiles Archive 🚀"
          single-commit: true